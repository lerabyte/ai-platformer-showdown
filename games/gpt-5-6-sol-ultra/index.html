<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumenling: The Shattered Skygarden</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #eefcff;
      --muted: #a9c8d2;
      --glass: rgba(7, 12, 28, 0.82);
      --edge: rgba(148, 246, 255, 0.35);
      --cyan: #8cfff4;
      --violet: #b690ff;
      --gold: #ffd978;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 20%, #17224b 0%, #080d21 45%, #03050d 100%);
      font-family: ui-rounded, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
      padding: 10px;
    }

    #gameShell {
      position: relative;
      width: min(100vw - 20px, calc((100vh - 20px) * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(166, 246, 255, 0.24);
      background: #050817;
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 0 60px rgba(60, 221, 255, 0.08);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050817;
      outline: none;
    }

    #vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 48%, rgba(0, 0, 0, 0.2) 78%, rgba(0, 0, 0, 0.55) 100%),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 4px);
      z-index: 3;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: clamp(16px, 3vw, 42px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 180ms ease, visibility 180ms ease;
      z-index: 5;
      background: rgba(2, 5, 14, 0.26);
    }

    #overlay.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .panel {
      position: relative;
      width: min(920px, 94%);
      max-height: 92%;
      overflow: auto;
      padding: clamp(24px, 4vw, 54px);
      border: 1px solid var(--edge);
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(20, 31, 63, 0.92), rgba(5, 10, 26, 0.94)),
        var(--glass);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.48),
        0 0 50px rgba(102, 243, 255, 0.08) inset;
      text-align: center;
      backdrop-filter: blur(16px);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 20px;
      pointer-events: none;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--cyan);
      font-weight: 800;
      font-size: clamp(12px, 1.4vw, 16px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(140, 255, 244, 0.55);
    }

    h1,
    h2 {
      margin: 0;
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    h1 {
      font-size: clamp(44px, 7.4vw, 94px);
      background: linear-gradient(90deg, #f7ffff 0%, #8cfff4 35%, #c8a1ff 68%, #ffd978 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 22px rgba(140, 255, 244, 0.22));
    }

    h2 {
      font-size: clamp(36px, 5vw, 68px);
      color: #f4feff;
      text-shadow: 0 0 24px rgba(140, 255, 244, 0.18);
    }

    .subtitle {
      margin: 14px auto 24px;
      max-width: 680px;
      color: #c2dce4;
      font-size: clamp(15px, 1.7vw, 20px);
      line-height: 1.55;
    }

    .instructions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 24px 0 28px;
      text-align: left;
    }

    .instruction {
      min-height: 108px;
      padding: 16px;
      border: 1px solid rgba(151, 241, 255, 0.16);
      border-radius: 16px;
      background: rgba(4, 10, 27, 0.62);
    }

    .instruction strong {
      display: block;
      margin-bottom: 8px;
      color: #f1ffff;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .instruction span {
      color: #a9c8d2;
      font-size: 14px;
      line-height: 1.45;
    }

    kbd {
      display: inline-grid;
      min-width: 28px;
      height: 28px;
      place-items: center;
      margin: 0 2px;
      padding: 0 8px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-bottom-color: rgba(255, 255, 255, 0.09);
      border-radius: 7px;
      background: linear-gradient(#233354, #111a33);
      color: white;
      font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.45), 0 0 12px rgba(140, 255, 244, 0.05) inset;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      cursor: pointer;
      color: #06131b;
      background: linear-gradient(90deg, #8cfff4, #9dd6ff);
      font: 900 15px/1 ui-rounded, "Segoe UI", system-ui, sans-serif;
      letter-spacing: 0.04em;
      box-shadow: 0 10px 30px rgba(73, 231, 255, 0.22), 0 0 0 1px rgba(255, 255, 255, 0.35) inset;
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-2px) scale(1.02);
      filter: brightness(1.08);
      box-shadow: 0 14px 36px rgba(73, 231, 255, 0.3), 0 0 0 2px rgba(255, 255, 255, 0.45) inset;
      outline: none;
    }

    button:active {
      transform: translateY(0) scale(0.99);
    }

    button.secondary {
      color: #dffbff;
      background: rgba(19, 33, 64, 0.92);
      box-shadow: 0 0 0 1px rgba(151, 241, 255, 0.24) inset;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 26px 0 10px;
    }

    .stat {
      padding: 16px 12px;
      border: 1px solid rgba(151, 241, 255, 0.14);
      border-radius: 16px;
      background: rgba(3, 9, 24, 0.56);
    }

    .stat b {
      display: block;
      color: #fff8cb;
      font-size: clamp(24px, 3vw, 40px);
      line-height: 1.1;
    }

    .stat small {
      display: block;
      margin-top: 6px;
      color: #94b8c4;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .tiny {
      margin: 18px 0 0;
      color: #7e9ca8;
      font-size: 12px;
      line-height: 1.5;
    }

    .level-chip {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 18px;
      padding: 8px 13px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
      color: #b7d8e2;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .level-chip::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
    }

    @media (max-width: 760px) {
      .instructions {
        grid-template-columns: 1fr;
      }

      .instruction {
        min-height: 0;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }

      .panel {
        padding: 24px 20px;
        border-radius: 20px;
      }

      #gameShell {
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <main id="gameShell" aria-label="Lumenling platform game">
    <canvas id="game" width="1280" height="720" tabindex="0"></canvas>
    <div id="vignette"></div>
    <div id="overlay" class="visible" role="dialog" aria-modal="true"></div>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d", { alpha: false });
      const overlay = document.getElementById("overlay");
      const W = canvas.width;
      const H = canvas.height;
      const TAU = Math.PI * 2;

      const TUNING = {
        maxHealth: 5,
        enemySpeed: 0.82,
        flyerRange: 0.9,
        turretCooldown: 1.3,
        projectileSpeed: 0.8,
        movingSpeed: 0.87,
        movingRange: 0.92,
        laserOnTime: 0.8,
        laserOffTime: 1.35,
        springPower: 1.05,
        jumpVelocity: 780,
        gravity: 1850,
        maximumFallSpeed: 980,
        coyoteTime: 0.19,
        jumpBufferTime: 0.18,
        hitInvulnerability: 1.65,
        checkpointInvulnerability: 2.15
      };

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const lerp = (a, b, t) => a + (b - a) * t;

      const approach = (value, target, amount) => {
        if (value < target) return Math.min(value + amount, target);
        if (value > target) return Math.max(value - amount, target);
        return target;
      };

      const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

      function aabb(a, b, inset = 0) {
        return (
          a.x + inset < b.x + b.w &&
          a.x + a.w - inset > b.x &&
          a.y + inset < b.y + b.h &&
          a.y + a.h - inset > b.y
        );
      }

      function hexToRgba(hex, alpha) {
        const clean = hex.replace("#", "");
        const value = parseInt(
          clean.length === 3
            ? clean.split("").map(character => character + character).join("")
            : clean,
          16
        );
        const red = (value >> 16) & 255;
        const green = (value >> 8) & 255;
        const blue = value & 255;
        return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
      }

      function roundRectPath(context, x, y, width, height, radius) {
        const limitedRadius = Math.min(radius, Math.abs(width) / 2, Math.abs(height) / 2);
        context.beginPath();
        context.moveTo(x + limitedRadius, y);
        context.arcTo(x + width, y, x + width, y + height, limitedRadius);
        context.arcTo(x + width, y + height, x, y + height, limitedRadius);
        context.arcTo(x, y + height, x, y, limitedRadius);
        context.arcTo(x, y, x + width, y, limitedRadius);
        context.closePath();
      }

      function seededRandom(seed) {
        let state = seed >>> 0;
        return () => {
          state += 0x6d2b79f5;
          let value = state;
          value = Math.imul(value ^ (value >>> 15), value | 1);
          value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
          return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
        };
      }

      function formatTime(seconds) {
        const total = Math.max(0, Math.floor(seconds));
        const minutes = Math.floor(total / 60);
        const remainingSeconds = total % 60;
        return `${minutes}:${remainingSeconds.toString().padStart(2, "0")}`;
      }

      const AudioEngine = {
        context: null,
        master: null,
        muted: false,
        nextMusicTime: 0,
        musicStep: 0,

        unlock() {
          if (!this.context) {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;

            try {
              this.context = new AudioContextClass();
              this.master = this.context.createGain();
              this.master.gain.value = this.muted ? 0 : 0.34;
              this.master.connect(this.context.destination);
              this.nextMusicTime = this.context.currentTime + 0.05;
            } catch (error) {
              this.context = null;
              return;
            }
          }

          if (this.context.state === "suspended") {
            this.context.resume().catch(() => {});
          }
        },

        toggle() {
          this.muted = !this.muted;

          if (this.master && this.context) {
            this.master.gain.cancelScheduledValues(this.context.currentTime);
            this.master.gain.setTargetAtTime(
              this.muted ? 0 : 0.34,
              this.context.currentTime,
              0.02
            );
          }

          showNotice(
            this.muted ? "Sound muted" : "Sound awakened",
            this.muted ? "#a6b8c4" : "#8cfff4",
            1.2
          );
        },

        tone(frequency, duration, options = {}) {
          if (!this.context || !this.master || this.muted) return;

          const now = this.context.currentTime + (options.delay || 0);
          const oscillator = this.context.createOscillator();
          const gain = this.context.createGain();

          oscillator.type = options.type || "sine";
          oscillator.frequency.setValueAtTime(Math.max(20, frequency), now);

          if (options.slide) {
            oscillator.frequency.exponentialRampToValueAtTime(
              Math.max(20, options.slide),
              now + duration
            );
          }

          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(
            options.volume || 0.12,
            now + Math.min(0.02, duration * 0.2)
          );
          gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

          oscillator.connect(gain);
          gain.connect(this.master);
          oscillator.start(now);
          oscillator.stop(now + duration + 0.03);
        },

        noise(duration = 0.12, volume = 0.08, highpass = 700) {
          if (!this.context || !this.master || this.muted) return;

          const sampleRate = this.context.sampleRate;
          const length = Math.max(1, Math.floor(sampleRate * duration));
          const buffer = this.context.createBuffer(1, length, sampleRate);
          const data = buffer.getChannelData(0);

          for (let index = 0; index < length; index++) {
            data[index] = (Math.random() * 2 - 1) * (1 - index / length);
          }

          const source = this.context.createBufferSource();
          const filter = this.context.createBiquadFilter();
          const gain = this.context.createGain();

          filter.type = "highpass";
          filter.frequency.value = highpass;
          gain.gain.setValueAtTime(volume, this.context.currentTime);
          gain.gain.exponentialRampToValueAtTime(
            0.0001,
            this.context.currentTime + duration
          );

          source.buffer = buffer;
          source.connect(filter);
          filter.connect(gain);
          gain.connect(this.master);
          source.start();
        },

        jump() {
          this.tone(260, 0.12, {
            type: "triangle",
            volume: 0.11,
            slide: 520
          });
        },

        land(strength = 1) {
          this.tone(110, 0.08, {
            type: "sine",
            volume: 0.035 * strength,
            slide: 80
          });
        },

        collect() {
          this.tone(660, 0.08, {
            type: "sine",
            volume: 0.09,
            slide: 980
          });
          this.tone(990, 0.11, {
            type: "triangle",
            volume: 0.05,
            delay: 0.05,
            slide: 1320
          });
        },

        heart() {
          this.tone(440, 0.11, {
            type: "sine",
            volume: 0.08,
            slide: 660
          });
          this.tone(660, 0.18, {
            type: "sine",
            volume: 0.06,
            delay: 0.08,
            slide: 880
          });
        },

        stomp() {
          this.tone(160, 0.11, {
            type: "square",
            volume: 0.06,
            slide: 90
          });
          this.noise(0.08, 0.045, 900);
        },

        hurt() {
          this.tone(210, 0.24, {
            type: "sawtooth",
            volume: 0.08,
            slide: 70
          });
          this.noise(0.18, 0.06, 350);
        },

        checkpoint() {
          [440, 660, 880, 1100].forEach((note, index) => {
            this.tone(note, 0.22, {
              type: "sine",
              volume: 0.055,
              delay: index * 0.07,
              slide: note * 1.02
            });
          });
        },

        spring() {
          this.tone(190, 0.16, {
            type: "square",
            volume: 0.07,
            slide: 760
          });
        },

        shoot() {
          this.tone(300, 0.09, {
            type: "sawtooth",
            volume: 0.035,
            slide: 170
          });
        },

        death() {
          [330, 260, 196, 130].forEach((note, index) => {
            this.tone(note, 0.32, {
              type: "triangle",
              volume: 0.065,
              delay: index * 0.11,
              slide: note * 0.72
            });
          });
          this.noise(0.45, 0.06, 180);
        },

        portal() {
          [330, 440, 660, 880, 1320].forEach((note, index) => {
            this.tone(note, 0.4, {
              type: index % 2 ? "sine" : "triangle",
              volume: 0.052,
              delay: index * 0.09,
              slide: note * 1.08
            });
          });
        },

        ui() {
          this.tone(520, 0.07, {
            type: "sine",
            volume: 0.045,
            slide: 680
          });
        },

        updateMusic() {
          if (
            !this.context ||
            !this.master ||
            this.muted ||
            mode !== "playing"
          ) {
            return;
          }

          const scales = [
            [220, 277.18, 329.63, 440, 554.37, 659.25],
            [196, 246.94, 293.66, 392, 493.88, 587.33],
            [174.61, 220, 261.63, 349.23, 440, 523.25]
          ];

          const scale = scales[currentLevelIndex] || scales[0];

          if (this.nextMusicTime < this.context.currentTime - 0.5) {
            this.nextMusicTime = this.context.currentTime + 0.02;
          }

          while (this.nextMusicTime < this.context.currentTime + 0.12) {
            const pattern = [0, 2, 4, 1, 3, 5, 4, 2];
            const index = pattern[this.musicStep % pattern.length];

            const oscillator = this.context.createOscillator();
            const gain = this.context.createGain();

            oscillator.type = "triangle";
            oscillator.frequency.setValueAtTime(
              scale[index] * (this.musicStep % 16 >= 8 ? 2 : 1),
              this.nextMusicTime
            );

            gain.gain.setValueAtTime(0.0001, this.nextMusicTime);
            gain.gain.exponentialRampToValueAtTime(
              0.018,
              this.nextMusicTime + 0.025
            );
            gain.gain.exponentialRampToValueAtTime(
              0.0001,
              this.nextMusicTime + 0.24
            );

            oscillator.connect(gain);
            gain.connect(this.master);
            oscillator.start(this.nextMusicTime);
            oscillator.stop(this.nextMusicTime + 0.26);

            if (this.musicStep % 4 === 0) {
              const bass = this.context.createOscillator();
              const bassGain = this.context.createGain();

              bass.type = "sine";
              bass.frequency.setValueAtTime(
                scale[0] / 2,
                this.nextMusicTime
              );

              bassGain.gain.setValueAtTime(0.0001, this.nextMusicTime);
              bassGain.gain.exponentialRampToValueAtTime(
                0.018,
                this.nextMusicTime + 0.02
              );
              bassGain.gain.exponentialRampToValueAtTime(
                0.0001,
                this.nextMusicTime + 0.45
              );

              bass.connect(bassGain);
              bassGain.connect(this.master);
              bass.start(this.nextMusicTime);
              bass.stop(this.nextMusicTime + 0.48);
            }

            this.nextMusicTime += 0.32;
            this.musicStep++;
          }
        }
      };

      const LEVELS = [
        {
          name: "Mosslight Grotto",
          subtitle: "Wake the roots and follow the river of blue fire.",
          seed: 1047,
          width: 4500,
          height: 920,
          spawn: { x: 110, y: 690 },
          palette: {
            bgTop: "#081b2d",
            bgBottom: "#120923",
            mist: "#246a72",
            accent: "#72ffe0",
            accent2: "#c78cff",
            warm: "#ffe28a",
            platform: "#172c35",
            platformDark: "#09151e",
            hazard: "#ff678f"
          },
          platforms: [
            { x: 0, y: 760, w: 820, h: 160 },
            { x: 1040, y: 760, w: 780, h: 160 },
            { x: 1940, y: 760, w: 760, h: 160 },
            { x: 2840, y: 760, w: 620, h: 160 },
            { x: 3600, y: 760, w: 900, h: 160 },
            { x: 350, y: 635, w: 190, h: 28 },
            { x: 650, y: 545, w: 150, h: 26 },
            { x: 1120, y: 630, w: 185, h: 26 },
            { x: 1440, y: 545, w: 165, h: 26 },
            { x: 1680, y: 650, w: 120, h: 26 },
            { x: 2040, y: 620, w: 190, h: 28 },
            { x: 2370, y: 530, w: 175, h: 26 },
            { x: 2580, y: 650, w: 105, h: 24 },
            { x: 2920, y: 615, w: 185, h: 26 },
            { x: 3250, y: 525, w: 155, h: 26 },
            { x: 3670, y: 620, w: 185, h: 26 },
            { x: 3980, y: 535, w: 165, h: 26 }
          ],
          moving: [
            {
              x: 865,
              y: 695,
              w: 125,
              h: 22,
              axis: "x",
              range: 42,
              speed: 1.25,
              phase: 0.3
            },
            {

              phase: 1.8
            }
          ],
          spikes: [
            { x: 590, y: 736, w: 105, h: 24 },
            { x: 1325, y: 736, w: 90, h: 24 },
            { x: 2245, y: 736, w: 100, h: 24 },
            { x: 3070, y: 736, w: 100, h: 24 },
            { x: 3850, y: 736, w: 95, h: 24 }
          ],
          pools: [
            { x: 820, y: 805, w: 220, h: 115 },
            { x: 1820, y: 805, w: 120, h: 115 },
            { x: 2700, y: 805, w: 140, h: 115 },
            { x: 3460, y: 805, w: 140, h: 115 }
          ],
          lasers: [],
          springs: [
            { x: 1730, y: 638, w: 54, h: 14, power: 830 }
          ],
          crystals: [
            { x: 230, y: 700 },
            { x: 430, y: 585 },
            { x: 715, y: 495 },

          if (!event.repeat) {
            keysPressed.add(event.code);

            if (event.code === "Enter") handleEnter();
            if (event.code === "Escape") handleEscape();
            if (event.code === "KeyM") AudioEngine.toggle();
            if (event.code === "KeyR" && mode === "playing") restartLevel();
          }

          keysDown.add(event.code);
        },
        { passive: false }
      );

      window.addEventListener("keyup", event => {
        keysDown.delete(event.code);
        keysReleased.add(event.code);
      });

      window.addEventListener("blur", () => {
        keysDown.clear();
        keysPressed.clear();
        keysReleased.clear();

        if (mode === "playing") {
          pauseGame();
        }
      });

      canvas.addEventListener("pointerdown", () => {
        AudioEngine.unlock();
        canvas.focus();
      });

      function createTitleStars() {
        const random = seededRandom(9991);

        return Array.from({ length: 105 }, () => ({
          x: random() * W,
          y: random() * H,
          size: 0.6 + random() * 2.2,
          speed: 0.15 + random() * 0.55,
          phase: random() * TAU
        }));
      }

      function createDecor(level) {
        const random = seededRandom(level.seed);

        const motes = Array.from({ length: 120 }, () => ({
          x: random() * level.width,
          y: random() * level.height,
          size: 0.8 + random() * 3,
          depth: 0.15 + random() * 0.55,
          phase: random() * TAU,
          drift: 8 + random() * 24
        }));

        const structures = Array.from({ length: 24 }, (_, index) => ({
          x: (index / 23) * level.width + (random() - 0.5) * 180,
          y: level.height * (0.2 + random() * 0.55),
          size: 45 + random() * 140,
          phase: random() * TAU,
          teeth: 8 + Math.floor(random() * 7)
        }));

        return {
          motes,
          structures
        };
      }

      function instantiateLevel(definition) {
        return {
          ...definition,
          palette: { ...definition.palette },

          platforms: definition.platforms.map(item => ({ ...item })),

          moving: definition.moving.map(item => ({
            ...item,
            range: item.range * TUNING.movingRange,
            speed: item.speed * TUNING.movingSpeed,
            baseX: item.x,
            baseY: item.y,
            prevX: item.x,
            prevY: item.y,
            dx: 0,
            dy: 0
          })),

          spikes: definition.spikes.map(item => ({ ...item })),
          pools: definition.pools.map(item => ({ ...item })),

          lasers: definition.lasers.map(item => ({
            ...item,
            on: item.on * TUNING.laserOnTime,
            off: item.off * TUNING.laserOffTime
          })),

          springs: definition.springs.map(item => ({
            ...item,
            power: item.power * TUNING.springPower,
            pulse: 0
          })),

          crystals: definition.crystals.map((item, index) => ({
            ...item,
            w: 30,
            h: 34,
            active: true,
            phase: index * 0.83
          })),

          hearts: definition.hearts.map((item, index) => ({
            ...item,
            w: 34,
            h: 34,
            active: true,
            phase: index * 1.71
          })),

          checkpoints: definition.checkpoints.map(item => ({
            ...item,
            activated: false,
            current: false
          })),

          enemies: definition.enemies.map((item, index) => {
            const cooldown = item.cooldown
              ? item.cooldown * TUNING.turretCooldown
              : 0;

            return {
              ...item,
              speed: item.speed
                ? item.speed * TUNING.enemySpeed
                : item.speed,
              rangeX: item.rangeX
                ? item.rangeX * TUNING.flyerRange
                : item.rangeX,
              rangeY: item.rangeY
                ? item.rangeY * TUNING.flyerRange
                : item.rangeY,
              cooldown,
              baseX: item.x,
              baseY: item.y,
              alive: true,
              phase: item.phase == null ? index * 0.71 : item.phase,
              shootTimer: cooldown
                ? cooldown * (0.55 + (index % 4) * 0.12)
                : 0,
              hitFlash: 0
            };
          }),

          portal: { ...definition.portal },
          decor: createDecor(definition)
        };
      }

      function createPlayer(x, y) {

          facing: 1,

        particles = [];

          player.x - W * 0.22,
          0,
          Math.max(0, world.width - W)

        camera.y = clamp(
          player.y - H * 0.6,
          0,
          Math.max(0, world.height - H)
        );

        screenShake = 0;
        flash = 0;
        transition = 1;
        banner.timer = banner.duration;
        mode = "playing";

        AudioEngine.musicStep = index * 2;

      function handleEnter() {
        if (mode === "title") {
          startNewGame();
        } else if (mode === "paused") {
          resumeGame();
        } else if (mode === "gameover") {
          if (activeCheckpoint) {
            continueFromCheckpoint();
          } else {
            restartLevel();
          }
        } else if (mode === "levelcomplete") {
          enterLevel(currentLevelIndex + 1, false);
        } else if (mode === "win") {
          startNewGame();
        }
      }

      function handleEscape() {
        if (mode === "playing") {
          pauseGame();
        } else if (mode === "paused") {
          resumeGame();
        }
      }

      function showNotice(text, color = "#ffffff", duration = 1.4) {
        notice.text = text;
        notice.color = color;
        notice.timer = duration;
        notice.duration = duration;
      }

      function jumpWasPressed() {
        return jumpKeys.some(key => keysPressed.has(key));
      }

      function jumpWasReleased() {
        return jumpKeys.some(key => keysReleased.has(key));
      }

      function jumpIsHeld() {
        return jumpKeys.some(key => keysDown.has(key));
      }

      function updateMovingPlatforms() {
        for (const platform of world.moving) {
          platform.prevX = platform.x;
          platform.prevY = platform.y;

          const wave = Math.sin(
            levelTime * platform.speed + platform.phase
          );

          platform.x =
            platform.baseX +
            (platform.axis === "x" ? wave * platform.range : 0);

          platform.y =
            platform.baseY +
            (platform.axis === "y" ? wave * platform.range : 0);

          platform.dx = platform.x - platform.prevX;
          platform.dy = platform.y - platform.prevY;
        }
      }

      function laserIsActive(laser) {
        const cycle = laser.on + laser.off;
        return ((levelTime + laser.phase) % cycle) < laser.on;
      }

      function updateEnemies(deltaTime) {
        for (const enemy of world.enemies) {
          if (!enemy.alive) continue;

          enemy.hitFlash = Math.max(0, enemy.hitFlash - deltaTime * 6);

          if (enemy.type === "walker") {
            enemy.x += enemy.speed * enemy.dir * deltaTime;

            if (enemy.x <= enemy.minX) {
              enemy.x = enemy.minX;
              enemy.dir = 1;
            } else if (enemy.x + enemy.w >= enemy.maxX) {
              enemy.x = enemy.maxX - enemy.w;
              enemy.dir = -1;
            }
          } else if (enemy.type === "flyer") {
            enemy.x =
              enemy.baseX +
              Math.sin(levelTime * enemy.speed + enemy.phase) *
                enemy.rangeX;

            enemy.y =
              enemy.baseY +
              Math.sin(
                levelTime * enemy.speed * 1.37 + enemy.phase * 1.7
              ) *
                enemy.rangeY;
          } else if (enemy.type === "turret") {
            enemy.shootTimer -= deltaTime;

            const deltaX =
              player.x +
              player.w / 2 -
              (enemy.x + enemy.w / 2);

            const deltaY =
              player.y +
              player.h / 2 -
              (enemy.y + enemy.h / 2);

            const distance = Math.hypot(deltaX, deltaY);

            if (
              enemy.shootTimer <= 0 &&
              distance < 720 &&
              distance > 100
            ) {
              const speed =
                (310 + currentLevelIndex * 32) *
                TUNING.projectileSpeed;

              projectiles.push({
                x: enemy.x + enemy.w / 2 - 7,
                y: enemy.y + enemy.h / 2 - 7,
                w: 14,
                h: 14,
                vx: (deltaX / distance) * speed,
                vy: (deltaY / distance) * speed,
                life: 3.2,
                phase: Math.random() * TAU
              });

              enemy.shootTimer = enemy.cooldown;
              AudioEngine.shoot();

              spawnBurst(
                enemy.x + enemy.w / 2,
                enemy.y + enemy.h / 2,
                world.palette.accent2,
                5,
                90,
                "spark"
              );
            }
          }
        }
      }

      function updateProjectiles(deltaTime) {
        for (
          let index = projectiles.length - 1;
          index >= 0;
          index--
        ) {
          const projectile = projectiles[index];

          projectile.life -= deltaTime;
          projectile.phase += deltaTime * 8;
          projectile.x += projectile.vx * deltaTime;
          projectile.y += projectile.vy * deltaTime;

          let remove =
            projectile.life <= 0 ||
            projectile.x < -100 ||
            projectile.x > world.width + 100 ||
            projectile.y < -100 ||
            projectile.y > world.height + 100;

          if (!remove) {
            for (const solid of world.platforms) {
              if (aabb(projectile, solid)) {
                remove = true;

                spawnBurst(
                  projectile.x + 7,
                  projectile.y + 7,
                  world.palette.accent2,
                  5,
                  70,
                  "spark"
                );

                break;
              }
            }
          }

          if (
            !remove &&
            aabb(player, projectile, 9) &&
            player.invulnerable <= 0 &&
            mode === "playing"
          ) {
            remove = true;
            takeEnemyHit(projectile.x + projectile.w / 2);
          }

          if (remove) {
            projectiles.splice(index, 1);
          }
        }
      }

      function resolveHorizontalCollisions(entity) {
        for (const solid of world.platforms) {
          if (!aabb(entity, solid)) continue;

          if (entity.vx > 0) {
            entity.x = solid.x - entity.w;
          } else if (entity.vx < 0) {
            entity.x = solid.x + solid.w;
          }

          entity.vx = 0;
        }
      }

      function resolveVerticalCollisions(
        entity,
        oldY,
        fallVelocity
      ) {
        const oldBottom = oldY + entity.h;
        const oldTop = oldY;

        for (const solid of world.platforms) {
          if (!aabb(entity, solid)) continue;

          if (entity.vy >= 0 && oldBottom <= solid.y + 22) {
            entity.y = solid.y - entity.h;
            entity.vy = 0;
            entity.grounded = true;
          } else if (
            entity.vy < 0 &&
            oldTop >= solid.y + solid.h - 14
          ) {
            entity.y = solid.y + solid.h;
            entity.vy = 0;
          } else {
            const overlapTop =
              entity.y + entity.h - solid.y;

            const overlapBottom =
              solid.y + solid.h - entity.y;

            if (overlapTop < overlapBottom) {
              entity.y -= overlapTop;
              entity.vy = 0;
              entity.grounded = true;
            } else {
              entity.y += overlapBottom;
              entity.vy = Math.max(0, entity.vy);
            }
          }
        }

        if (!entity.grounded && entity.vy >= 0) {
          for (const platform of world.moving) {
            const horizontal =
              entity.x + entity.w > platform.x - 3 &&
              entity.x < platform.x + platform.w + 3;

            const crossedTop =
              oldBottom <=
                platform.y +
                  Math.max(23, Math.abs(platform.dy) + 13) &&
              entity.y + entity.h >= platform.y;

            if (
              horizontal &&
              crossedTop &&
              entity.y + entity.h <= platform.y + platform.h + 29
            ) {
              entity.y = platform.y - entity.h;
              entity.vy = 0;
              entity.grounded = true;
              entity.groundPlatform = platform;
              break;
            }
          }
        }

        if (entity.grounded && fallVelocity > 290) {
          entity.squash = clamp(
            fallVelocity / 1100,
            0.16,
            0.48
          );

          AudioEngine.land(
            clamp(fallVelocity / 700, 0.7, 1.35)
          );

          spawnDust(
            entity.x + entity.w / 2,
            entity.y + entity.h,
            fallVelocity > 700 ? 10 : 6
          );
        }
      }

      function updatePlayer(deltaTime) {
        const entity = player;

        entity.prevX = entity.x;
        entity.prevY = entity.y;
        entity.invulnerable = Math.max(
          0,
          entity.invulnerable - deltaTime
        );
        entity.squash = approach(
          entity.squash,
          0,
          deltaTime * 2.8
        );

        const wasGrounded = entity.grounded;

        if (
          entity.groundPlatform &&
          entity.groundPlatform.dx != null
        ) {
          entity.x += entity.groundPlatform.dx;
          entity.y += entity.groundPlatform.dy;
        }

        entity.coyote = wasGrounded
          ? TUNING.coyoteTime
          : Math.max(0, entity.coyote - deltaTime);

        entity.jumpBuffer = Math.max(
          0,
          entity.jumpBuffer - deltaTime
        );

        if (jumpWasPressed()) {
          entity.jumpBuffer = TUNING.jumpBufferTime;
        }

        const moveLeft =
          keysDown.has("KeyA") ||
          keysDown.has("ArrowLeft");

        const moveRight =
          keysDown.has("KeyD") ||
          keysDown.has("ArrowRight");

        const moveAxis =
          (moveRight ? 1 : 0) - (moveLeft ? 1 : 0);

        if (moveAxis !== 0) {
          entity.facing = moveAxis;
        }

        const maxSpeed =
          currentLevelIndex === 2 ? 345 : 335;

        const acceleration =
          wasGrounded ? 2850 : 1750;

        const deceleration =
          wasGrounded ? 3300 : 950;

        const targetSpeed = moveAxis * maxSpeed;

        entity.vx = approach(
          entity.vx,
          targetSpeed,
          (moveAxis ? acceleration : deceleration) * deltaTime
        );

        if (
          entity.jumpBuffer > 0 &&
          entity.coyote > 0
        ) {
          entity.jumpBuffer = 0;
          entity.coyote = 0;
          entity.grounded = false;
          entity.groundPlatform = null;
          entity.vy = -TUNING.jumpVelocity;
          entity.squash = -0.22;

          AudioEngine.jump();

          spawnDust(
            entity.x + entity.w / 2,
            entity.y + entity.h,
            7
          );
        }

        if (
          jumpWasReleased() &&
          entity.vy < -180
        ) {
          entity.vy *= 0.52;
        }

        const gravityScale =
          entity.vy < 0 && jumpIsHeld()
            ? 0.75
            : 1.03;

        entity.vy = Math.min(
          entity.vy +
            TUNING.gravity * gravityScale * deltaTime,
          TUNING.maximumFallSpeed
        );

        entity.x += entity.vx * deltaTime;
        resolveHorizontalCollisions(entity);

        entity.x = clamp(
          entity.x,
          0,
          world.width - entity.w
        );

        const oldY = entity.y;
        const fallVelocity = entity.vy;

        entity.y += entity.vy * deltaTime;
        entity.grounded = false;
        entity.groundPlatform = null;

        resolveVerticalCollisions(
          entity,
          oldY,
          fallVelocity
        );

        for (const spring of world.springs) {
          spring.pulse = Math.max(
            0,
            spring.pulse - deltaTime * 4.5
          );

          const feetOnPad =
            entity.x + entity.w > spring.x - 2 &&
            entity.x < spring.x + spring.w + 2 &&
            entity.y + entity.h >= spring.y - 7 &&
            entity.y + entity.h <=
              spring.y + spring.h + 20 &&
            entity.vy >= 0;

          if (feetOnPad) {
            entity.y = spring.y - entity.h;
            entity.vy = -(spring.power || 880);
            entity.grounded = false;
            entity.groundPlatform = null;
            entity.squash = -0.34;
            spring.pulse = 1;

            AudioEngine.spring();

            spawnBurst(
              spring.x + spring.w / 2,
              spring.y,
              world.palette.warm,
              14,
              180,
              "spark"
            );
          }
        }

        entity.animTime +=
          deltaTime *
          (2.2 + Math.abs(entity.vx) / 52);

        entity.trailTimer -= deltaTime;

        if (
          entity.trailTimer <= 0 &&
          (Math.abs(entity.vx) > 150 ||
            Math.abs(entity.vy) > 260)
        ) {
          entity.trailTimer = 0.055;

          particles.push({
            x:
              entity.x +
              entity.w * 0.45 -
              entity.facing * 9,
            y: entity.y + entity.h * 0.55,
            vx:
              -entity.vx * 0.08 +
              (Math.random() - 0.5) * 18,
            vy: (Math.random() - 0.5) * 22,
            life: 0.34,
            maxLife: 0.34,
            size: 3 + Math.random() * 3,
            color: world.palette.accent,
            gravity: 0,
            shape: "dot"
          });
        }

        handleCollectibles();
        handleCheckpoints();
        handleEnemyCollisions();
        handleHazards();
        handlePortal();

        if (
          entity.y > world.height + 140 &&
          mode === "playing"
        ) {
          takeHazardHit(
            "The void sap pulled you under"
          );
        }
      }

      function handleCollectibles() {
        for (const crystal of world.crystals) {
          if (!crystal.active) continue;

          const box = {
            x: crystal.x - 17,
            y: crystal.y - 19,
            w: 34,
            h: 38
          };

          if (aabb(player, box, 3)) {
            crystal.active = false;
            score += 100 + currentLevelIndex * 25;
            levelShards++;
            totalShards++;

            AudioEngine.collect();

            spawnBurst(
              crystal.x,
              crystal.y,
              world.palette.accent,
              14,
              150,
              "diamond"
            );

            showNotice(
              `Lumen shard ${levelShards} / ${world.crystals.length}`,
              world.palette.accent,
              0.9
            );
          }
        }

        for (const heart of world.hearts) {
          if (!heart.active) continue;

          const box = {
            x: heart.x - 19,
            y: heart.y - 19,
            w: 38,
            h: 38
          };

          if (aabb(player, box, 3)) {
            heart.active = false;

            if (health < maxHealth) {
              health++;
              score += 75;

              showNotice(
                "Dawn petal restored one spark",
                world.palette.warm,
                1.3
              );
            } else {
              score += 250;

              showNotice(
                "Dawn petal bonus +250",
                world.palette.warm,
                1.3
              );
            }

            AudioEngine.heart();

            spawnBurst(
              heart.x,
              heart.y,
              world.palette.warm,
              18,
              145,
              "petal"
            );
          }
        }
      }

      function handleCheckpoints() {
        for (const checkpoint of world.checkpoints) {
          const generousCheckpointBox = {
            x: checkpoint.x - 10,
            y: checkpoint.y - 5,
            w: checkpoint.w + 20,
            h: checkpoint.h + 10
          };

          if (
            !aabb(player, generousCheckpointBox, 4) ||
            checkpoint.current
          ) {
            continue;
          }

          const firstActivation =
            !checkpoint.activated;

          for (const other of world.checkpoints) {
            other.current = false;
          }

          checkpoint.activated = true;
          checkpoint.current = true;
          activeCheckpoint = checkpoint;

          checkpointSpawn = {
            x: checkpoint.spawnX,
            y: checkpoint.spawnY
          };

          health = maxHealth;

          if (firstActivation) {
            score += 150;

            AudioEngine.checkpoint();

            screenShake = Math.max(
              screenShake,
              7
            );

            spawnBurst(
              checkpoint.x + checkpoint.w / 2,
              checkpoint.y + 12,
              world.palette.accent,
              30,
              220,
              "spark"
            );

            showNotice(
              "Lantern awakened — checkpoint saved and fully healed",
              world.palette.accent,
              2.25
            );
          } else {
            AudioEngine.ui();

            showNotice(
              "Checkpoint restored — sparks fully healed",
              world.palette.accent,
              1.5
            );
          }
        }
      }

      function handleEnemyCollisions() {
        for (const enemy of world.enemies) {
          if (
            !enemy.alive ||
            !aabb(player, enemy, 8)
          ) {
            continue;
          }

          const previousBottom =
            player.prevY + player.h;

          const enemyTop = enemy.y;

          const stomping =
            player.vy > 50 &&
            previousBottom <= enemyTop + 27;

          if (stomping) {
            enemy.alive = false;
            player.y = enemy.y - player.h;
            player.vy = -500;
            player.squash = -0.24;

            score +=
              enemy.type === "turret"
                ? 350
                : enemy.type === "flyer"
                  ? 250
                  : 200;

            AudioEngine.stomp();

            screenShake = Math.max(
              screenShake,
              5
            );

            spawnBurst(
              enemy.x + enemy.w / 2,
              enemy.y + enemy.h / 2,
              world.palette.accent2,
              18,
              190,
              "spark"
            );

            showNotice(
              enemy.type === "turret"
                ? "Prism sentry shattered"
                : "Hollowling dispersed",
              world.palette.accent2,
              0.9
            );
          } else if (player.invulnerable <= 0) {
            takeEnemyHit(
              enemy.x + enemy.w / 2
            );
            enemy.hitFlash = 1;
          }
        }
      }

      function handleHazards() {
        if (
          mode !== "playing" ||
          player.invulnerable > 0
        ) {
          return;
        }

        const hurtbox = {
          x: player.x + 10,
          y: player.y + 8,
          w: player.w - 20,
          h: player.h - 13
        };

        for (const spike of world.spikes) {
          const box = {
            x: spike.x + 12,
            y: spike.y + 10,
            w: Math.max(1, spike.w - 24),
            h: Math.max(1, spike.h - 10)
          };

          if (aabb(hurtbox, box)) {
            takeHazardHit(
              "Thorns scattered your light"
            );
            return;
          }
        }

        for (const pool of world.pools) {
          const box = {
            x: pool.x + 10,
            y: pool.y + 17,
            w: Math.max(1, pool.w - 20),
            h: Math.max(1, pool.h - 17)
          };

          if (aabb(hurtbox, box)) {
            takeHazardHit(
              "Void sap pulled you under"
            );
            return;
          }
        }

        for (const laser of world.lasers) {
          if (!laserIsActive(laser)) continue;

          const vertical = laser.h > laser.w;

          const box = vertical
            ? {
                x: laser.x + 4,
                y: laser.y + 8,
                w: Math.max(1, laser.w - 8),
                h: Math.max(1, laser.h - 16)
              }
            : {
                x: laser.x + 8,
                y: laser.y + 4,
                w: Math.max(1, laser.w - 16),
                h: Math.max(1, laser.h - 8)
              };

          if (aabb(hurtbox, box)) {
            takeHazardHit(
              "A prism beam broke your glow"
            );
            return;
          }
        }
      }

      function handlePortal() {
        if (mode !== "playing") return;

        const portalHitbox = {
          x: world.portal.x + 4,
          y: world.portal.y + 4,
          w: world.portal.w - 8,
          h: world.portal.h - 4
        };

        if (aabb(player, portalHitbox, 2)) {
          completeLevel();
        }
      }

      function takeEnemyHit(sourceX) {
        if (
          mode !== "playing" ||
          player.invulnerable > 0
        ) {
          return;
        }

        health--;
        hitsTaken++;

        screenShake = Math.max(
          screenShake,
          14
        );

        flash = Math.max(flash, 0.38);

        AudioEngine.hurt();

        spawnBurst(
          player.x + player.w / 2,
          player.y + player.h / 2,
          world.palette.hazard,
          22,
          210,
          "spark"
        );

        if (health <= 0) {
          triggerDeath();
          return;
        }

        player.invulnerable = TUNING.hitInvulnerability;

        const direction =
          player.x + player.w / 2 < sourceX
            ? -1
            : 1;

        player.vx = direction * 390;
        player.vy = -430;

        showNotice(
          `${health} sparks remain`,
          world.palette.hazard,
          1.1
        );
      }

      function takeHazardHit(message) {
        if (
          mode !== "playing" ||
          player.invulnerable > 0
        ) {
          return;
        }

        health--;
        hitsTaken++;

        screenShake = Math.max(
          screenShake,
          18
        );

        flash = Math.max(flash, 0.48);

        AudioEngine.hurt();

        spawnBurst(
          player.x + player.w / 2,
          player.y + player.h / 2,
          world.palette.hazard,
          28,
          245,
          "spark"
        );

        if (health <= 0) {
          triggerDeath();
          return;
        }

        respawnAtCheckpoint();

        showNotice(
          `${message} — ${health} sparks remain`,
          world.palette.hazard,
          1.7
        );
      }

      function respawnAtCheckpoint() {
        player.x = checkpointSpawn.x;
        player.y = checkpointSpawn.y;
        player.prevX = player.x;
        player.prevY = player.y;
        player.vx = 0;
        player.vy = 0;
        player.grounded = false;
        player.groundPlatform = null;
        player.invulnerable = TUNING.checkpointInvulnerability;

        projectiles = [];

        camera.x = clamp(
          player.x - W * 0.32,
          0,
          Math.max(0, world.width - W)
        );

        camera.y = clamp(
          player.y - H * 0.58,
          0,
          Math.max(0, world.height - H)
        );

        transition = Math.max(
          transition,
          0.65
        );

        spawnBurst(
          player.x + player.w / 2,
          player.y + player.h / 2,
          world.palette.accent,
          22,
          175,
          "spark"
        );
      }

      function triggerDeath() {
        if (mode !== "playing") return;

        mode = "dying";
        deathTimer = 1.05;
        deaths++;

        player.dead = true;
        player.vx = 0;
        player.vy = 0;

        AudioEngine.death();

        screenShake = 25;
        flash = 0.8;

        spawnBurst(
          player.x + player.w / 2,
          player.y + player.h / 2,
          world.palette.warm,
          48,
          340,
          "diamond"
        );

        spawnBurst(
          player.x + player.w / 2,
          player.y + player.h / 2,
          world.palette.accent2,
          35,
          280,
          "spark"
        );
      }

      function completeLevel() {
        if (mode !== "playing") return;

        const timeBonus =
          Math.max(
            0,
            Math.floor(110 - levelTime)
          ) * 8;

        const healthBonus = health * 220;

        const shardBonus =
          levelShards === world.crystals.length
            ? 1000
            : 0;

        const bonus =
          timeBonus +
          healthBonus +
          shardBonus;

        score += bonus;

        completionStats = {
          time: levelTime,
          shards: levelShards,
          bonus
        };

        mode = "finishing";
        finishTimer = 1.25;

        player.vx = 0;
        player.vy = 0;
        player.portalPull = 0;

        AudioEngine.portal();

        screenShake = 8;

        for (let index = 0; index < 70; index++) {
          const angle = Math.random() * TAU;
          const speed =
            90 + Math.random() * 300;

          particles.push({
            x:
              world.portal.x +
              world.portal.w / 2,
            y:
              world.portal.y +
              world.portal.h / 2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.7 + Math.random() * 0.9,
            maxLife: 1.6,
            size: 2 + Math.random() * 6,
            color:
              Math.random() > 0.45
                ? world.palette.accent
                : world.palette.accent2,
            gravity: 30,
            shape:
              Math.random() > 0.55
                ? "diamond"
                : "spark"
          });
        }
      }

      function spawnDust(x, y, count) {
        if (!world) return;

        for (let index = 0; index < count; index++) {
          particles.push({
            x: x + (Math.random() - 0.5) * 26,
            y: y - 2,
            vx: (Math.random() - 0.5) * 120,
            vy: -25 - Math.random() * 75,
            life: 0.35 + Math.random() * 0.25,
            maxLife: 0.6,
            size: 3 + Math.random() * 5,
            color: world.palette.mist,
            gravity: 170,
            shape: "dot"
          });
        }
      }

      function spawnBurst(
        x,
        y,
        color,
        count,
        speed,
        shape = "dot"
      ) {
        for (let index = 0; index < count; index++) {
          const angle = Math.random() * TAU;
          const velocity =
            speed *
            (0.28 + Math.random() * 0.72);

          particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            life: 0.35 + Math.random() * 0.65,
            maxLife: 1,
            size: 2 + Math.random() * 5,
            color,
            gravity:
              120 + Math.random() * 160,
            shape
          });
        }

        if (particles.length > 700) {
          particles.splice(
            0,
            particles.length - 700
          );
        }
      }

      function updateParticles(deltaTime) {
        for (
          let index = particles.length - 1;
          index >= 0;
          index--
        ) {
          const particle = particles[index];

          particle.life -= deltaTime;

          if (particle.life <= 0) {
            particles.splice(index, 1);
            continue;
          }

          particle.vy +=
            (particle.gravity || 0) *
            deltaTime;

          particle.x +=
            particle.vx * deltaTime;

          particle.y +=
            particle.vy * deltaTime;

          particle.vx *= Math.pow(
            0.985,
            deltaTime * 60
          );
        }
      }

      function updateCamera(deltaTime) {
        if (!player || !world) return;

        const lookAhead = clamp(
          player.vx * 0.28,
          -90,
          130
        );

        const targetX = clamp(
          player.x +
            player.w / 2 +
            lookAhead -
            W * 0.42,
          0,
          Math.max(0, world.width - W)
        );

        const targetY = clamp(
          player.y +
            player.h / 2 -
            H * 0.57,
          0,
          Math.max(0, world.height - H)
        );

        const follow =
          1 - Math.exp(-5.2 * deltaTime);

        camera.x = lerp(
          camera.x,
          targetX,
          follow
        );

        camera.y = lerp(
          camera.y,
          targetY,
          follow * 0.86
        );
      }

      function update(deltaTime) {
        globalTime += deltaTime;

        notice.timer = Math.max(
          0,
          notice.timer - deltaTime
        );

        banner.timer = Math.max(
          0,
          banner.timer - deltaTime
        );

        screenShake = Math.max(
          0,
          screenShake - deltaTime * 30
        );

        flash = Math.max(
          0,
          flash - deltaTime * 1.9
        );

        transition = Math.max(
          0,
          transition - deltaTime * 1.8
        );

        if (mode === "playing") {
          gameTime += deltaTime;
          levelTime += deltaTime;

          updateMovingPlatforms();
          updateEnemies(deltaTime);
          updateProjectiles(deltaTime);
          updatePlayer(deltaTime);
          updateCamera(deltaTime);
          AudioEngine.updateMusic();
        } else if (mode === "dying") {
          deathTimer -= deltaTime;
          updateCamera(deltaTime);

          if (deathTimer <= 0) {
            showDeathScreen();
          }
        } else if (mode === "finishing") {
          finishTimer -= deltaTime;

          player.portalPull = clamp(
            player.portalPull +
              deltaTime * 1.4,
            0,
            1
          );

          const centerX =
            world.portal.x +
            world.portal.w / 2 -
            player.w / 2;

          const centerY =
            world.portal.y +
            world.portal.h / 2 -
            player.h / 2;

          player.x = lerp(
            player.x,
            centerX,
            1 - Math.exp(-4 * deltaTime)
          );

          player.y = lerp(
            player.y,
            centerY,
            1 - Math.exp(-4 * deltaTime)
          );

          updateCamera(deltaTime);

          if (finishTimer <= 0) {
            if (
              currentLevelIndex ===
              LEVELS.length - 1
            ) {
              showWinScreen();
            } else {
              showLevelCompleteScreen();
            }
          }
        }

        updateParticles(deltaTime);
        keysPressed.clear();
        keysReleased.clear();
      }

      function drawTitleBackground() {
        const gradient = ctx.createLinearGradient(
          0,
          0,
          0,
          H
        );

        gradient.addColorStop(0, "#11183e");
        gradient.addColorStop(0.58, "#091326");
        gradient.addColorStop(1, "#030610");

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);

        for (const star of titleStars) {
          const twinkle =
            0.35 +
            0.65 *
              Math.sin(
                globalTime *
                  star.speed *
                  3 +
                  star.phase
              ) ** 2;

          ctx.globalAlpha =
            0.18 + twinkle * 0.72;

          ctx.fillStyle =
            star.size > 1.8
              ? "#d6ffff"
              : "#8edcf3";

          ctx.beginPath();
          ctx.arc(
            star.x,
            star.y,
            star.size * twinkle,
            0,
            TAU
          );
          ctx.fill();
        }

        ctx.globalAlpha = 1;

        const aurora = ctx.createLinearGradient(
          0,
          180,
          W,
          400
        );

        aurora.addColorStop(
          0,
          "rgba(102,255,226,0)"
        );
        aurora.addColorStop(
          0.32,
          "rgba(102,255,226,0.12)"
        );
        aurora.addColorStop(
          0.68,
          "rgba(205,126,255,0.13)"
        );
        aurora.addColorStop(
          1,
          "rgba(255,210,111,0)"
        );

        ctx.strokeStyle = aurora;
        ctx.lineWidth = 60;
        ctx.lineCap = "round";
        ctx.beginPath();

        ctx.moveTo(
          -80,
          230 +
            Math.sin(globalTime * 0.35) *
              20
        );

        ctx.bezierCurveTo(
          280,
          100,
          720,
          430,
          1360,
          170 +
            Math.sin(globalTime * 0.28) *
              30
        );

        ctx.stroke();

        ctx.fillStyle =
          "rgba(9,18,31,0.9)";

        for (let index = 0; index < 8; index++) {
          const x =
            index * 190 -
            50 +
            Math.sin(index * 2.3) * 35;

          const y =
            520 +
            Math.sin(index * 1.7) * 55;

          ctx.beginPath();
          ctx.ellipse(
            x,
            y,
            140,
            36,
            -0.08,
            0,
            TAU
          );
          ctx.fill();

          ctx.fillRect(
            x - 90,
            y,
            180,
            210
          );

          ctx.fillStyle =
            index % 2
              ? "rgba(109,255,220,0.08)"
              : "rgba(185,126,255,0.08)";

          ctx.fillRect(
            x - 80,
            y - 4,
            160,
            5
          );

          ctx.fillStyle =
            "rgba(9,18,31,0.9)";
        }

        ctx.save();
        ctx.translate(W * 0.18, H * 0.78);
        ctx.scale(1.25, 1.25);
        drawPreviewLumenling();
        ctx.restore();
      }

      function drawPreviewLumenling() {
        const bob =
          Math.sin(globalTime * 3.3) * 3;

        ctx.translate(0, bob);

        ctx.shadowBlur = 22;
        ctx.shadowColor = "#8cfff4";
        ctx.fillStyle = "#96fff0";

        ctx.beginPath();
        ctx.ellipse(
          0,
          0,
          15,
          19,
          0,
          0,
          TAU
        );
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#eaffff";

        ctx.beginPath();
        ctx.arc(0, -22, 16, 0, TAU);
        ctx.fill();

        ctx.fillStyle = "#10223a";

        ctx.beginPath();
        ctx.arc(-5, -24, 2.2, 0, TAU);
        ctx.arc(5, -24, 2.2, 0, TAU);
        ctx.fill();

        ctx.strokeStyle = "#c893ff";
        ctx.lineWidth = 4;

        ctx.beginPath();
        ctx.moveTo(10, -10);
        ctx.quadraticCurveTo(
          32,
          -4,
          42 +
            Math.sin(globalTime * 4) * 4,
          -12
        );
        ctx.stroke();

        ctx.fillStyle = "#8cfff4";

        ctx.beginPath();
        ctx.ellipse(
          3,
          -43,
          6,
          13,
          0.5,
          0,
          TAU
        );
        ctx.fill();
      }

      function drawBackground() {
        const palette = world.palette;

        const gradient = ctx.createLinearGradient(
          0,
          0,
          0,
          H
        );

        gradient.addColorStop(
          0,
          palette.bgTop
        );
        gradient.addColorStop(
          1,
          palette.bgBottom
        );

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);

        if (currentLevelIndex === 0) {
          drawGrottoBackground();
        } else if (currentLevelIndex === 1) {
          drawConservatoryBackground();
        } else {
          drawGlassworksBackground();
        }

        for (const mote of world.decor.motes) {
          const parallaxX =
            mote.x - camera.x * mote.depth;

          const parallaxY =
            mote.y -
            camera.y *
              (mote.depth * 0.45);

          if (
            parallaxX < -20 ||
            parallaxX > W + 20 ||
            parallaxY < -20 ||
            parallaxY > H + 20
          ) {
            continue;
          }

          const pulse =
            0.45 +
            Math.sin(
              globalTime * 1.8 +
                mote.phase
            ) *
              0.28;

          ctx.globalAlpha = clamp(
            pulse,
            0.12,
            0.78
          );

          ctx.fillStyle =
            mote.depth > 0.42
              ? world.palette.accent
              : world.palette.accent2;

          ctx.beginPath();
          ctx.arc(
            parallaxX,
            parallaxY +
              Math.sin(
                globalTime +
                  mote.phase
              ) *
                mote.drift *
                0.12,
            mote.size * mote.depth,
            0,
            TAU
          );
          ctx.fill();
        }

        ctx.globalAlpha = 1;
      }

      function drawGrottoBackground() {
        const palette = world.palette;

        ctx.save();
        ctx.translate(
          -camera.x * 0.09,
          -camera.y * 0.08
        );

        for (
          let layer = 0;
          layer < 3;
          layer++
        ) {
          const baseY = 500 + layer * 90;

          ctx.fillStyle = hexToRgba(
            layer === 0
              ? palette.mist
              : palette.platformDark,
            0.28 + layer * 0.18
          );

          ctx.beginPath();
          ctx.moveTo(-100, H + 220);

          for (
            let x = -100;
            x <= W + 250;
            x += 150
          ) {
            const y =
              baseY +
              Math.sin(
                (x + camera.x * 0.08) *
                  0.008 +
                  layer
              ) *
                (50 + layer * 20);

            ctx.quadraticCurveTo(
              x + 75,
              y - 80,
              x + 150,
              y
            );
          }

          ctx.lineTo(W + 250, H + 220);
          ctx.closePath();
          ctx.fill();
        }

        ctx.restore();

        ctx.save();
        ctx.translate(
          -camera.x * 0.16,
          -camera.y * 0.12
        );

        for (const structure of world.decor.structures.slice(0, 14)) {
          const x = structure.x * 0.35;

          if (
            x < -180 ||
            x > W + 180
          ) {
            continue;
          }

          const y =
            430 +
            Math.sin(structure.phase) *
              90;

          ctx.strokeStyle = hexToRgba(
            palette.accent2,
            0.08
          );

          ctx.lineWidth = 12;
          ctx.beginPath();
          ctx.moveTo(x, H + 70);

          ctx.bezierCurveTo(
            x - 90,
            y + 130,
            x + 110,
            y + 60,
            x,
            y - structure.size * 0.5
          );

          ctx.stroke();

          ctx.fillStyle = hexToRgba(
            palette.accent,
            0.08
          );

          ctx.beginPath();
          ctx.ellipse(
            x,
            y - structure.size * 0.48,
            structure.size * 0.16,
            structure.size * 0.35,
            0.3,
            0,
            TAU
          );
          ctx.fill();
        }

        ctx.restore();
      }

      function drawConservatoryBackground() {
        const palette = world.palette;

        ctx.save();
        ctx.translate(
          -camera.x * 0.12,
          -camera.y * 0.08
        );

        ctx.strokeStyle = hexToRgba(
          palette.accent2,
          0.08
        );

        ctx.lineWidth = 5;

        for (
          let x = -200;
          x < W + 300;
          x += 210
        ) {
          ctx.beginPath();
          ctx.moveTo(x, -80);
          ctx.lineTo(x + 130, H + 80);
          ctx.stroke();
        }

        for (const structure of world.decor.structures) {
          const x = structure.x * 0.28;

          const y =
            150 +
            (structure.y * 0.28) % 470;

          if (
            x < -180 ||
            x > W + 180
          ) {
            continue;
          }

          drawGear(
            x,
            y,
            structure.size * 0.32,
            structure.teeth,
            globalTime *
              0.08 *
              (structure.phase > Math.PI
                ? -1
                : 1),
            hexToRgba(
              palette.accent2,
              0.08
            )
          );
        }

        ctx.restore();

        const haze = ctx.createLinearGradient(
          0,
          H * 0.45,
          0,
          H
        );

        haze.addColorStop(
          0,
          "rgba(255,145,94,0)"
        );

        haze.addColorStop(
          1,
          "rgba(255,145,94,0.09)"
        );

        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, W, H);
      }

      function drawGear(
        x,
        y,
        radius,
        teeth,
        rotation,
        color
      ) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);

        ctx.strokeStyle = color;
        ctx.lineWidth = Math.max(
          3,
          radius * 0.09
        );

        ctx.beginPath();

        for (
          let index = 0;
          index < teeth * 2;
          index++
        ) {
          const gearRadius =
            index % 2
              ? radius * 0.82
              : radius;

          const angle =
            (index / (teeth * 2)) *
            TAU;

          const pointX =
            Math.cos(angle) *
            gearRadius;

          const pointY =
            Math.sin(angle) *
            gearRadius;

          if (index === 0) {
            ctx.moveTo(pointX, pointY);
          } else {
            ctx.lineTo(pointX, pointY);
          }
        }

        ctx.closePath();
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(
          0,
          0,
          radius * 0.32,
          0,
          TAU
        );
        ctx.stroke();

        ctx.restore();
      }

      function drawGlassworksBackground() {
        const palette = world.palette;

        ctx.save();
        ctx.globalCompositeOperation = "screen";

        for (let index = 0; index < 3; index++) {
          const gradient =
            ctx.createLinearGradient(
              0,
              0,
              W,
              H
            );

          gradient.addColorStop(
            0,
            "rgba(88,255,232,0)"
          );

          gradient.addColorStop(
            0.32 + index * 0.12,
            index === 1
              ? "rgba(255,102,216,0.12)"
              : "rgba(88,255,232,0.1)"
          );

          gradient.addColorStop(
            1,
            "rgba(255,236,143,0)"
          );

          ctx.strokeStyle = gradient;
          ctx.lineWidth =
            34 + index * 12;

          ctx.beginPath();

          ctx.moveTo(
            -120,
            120 +
              index * 80 +
              Math.sin(
                globalTime * 0.25 +
                  index
              ) *
                25
          );

          ctx.bezierCurveTo(
            260,
            20 + index * 70,
            720,
            350 - index * 40,
            1400,
            80 + index * 110
          );

          ctx.stroke();
        }

        ctx.globalCompositeOperation =
          "source-over";

        ctx.restore();

        ctx.save();
        ctx.translate(
          -camera.x * 0.12,
          -camera.y * 0.1
        );

        for (
          let index = 0;
          index < 15;
          index++
        ) {
          const x =
            index * 130 - 80;

          const height =
            120 + ((index * 73) % 240);

          const y = H - 40;

          const crystalGradient =
            ctx.createLinearGradient(
              x,
              y - height,
              x + 80,
              y
            );

          crystalGradient.addColorStop(
            0,
            hexToRgba(
              index % 2
                ? palette.accent2
                : palette.accent,
              0.12
            )
          );

          crystalGradient.addColorStop(
            1,
            "rgba(8,13,36,0.38)"
          );

          ctx.fillStyle =
            crystalGradient;

          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(
            x + 34,
            y - height
          );
          ctx.lineTo(x + 72, y);
          ctx.closePath();
          ctx.fill();
        }

        ctx.restore();
      }

      function drawWorld() {
        const shakeX =
          screenShake > 0
            ? (Math.random() - 0.5) *
              screenShake
            : 0;

        const shakeY =
          screenShake > 0
            ? (Math.random() - 0.5) *
              screenShake *
              0.6
            : 0;

        ctx.save();

        ctx.translate(
          -camera.x + shakeX,
          -camera.y + shakeY
        );

        drawPools();
        drawWorldScenery();

        for (const platform of world.platforms) {
          drawPlatform(platform, false);
        }

        for (const platform of world.moving) {
          drawPlatform(platform, true);
        }

        drawSprings();
        drawSpikes();
        drawLasers();
        drawCheckpoints();
        drawCollectibles();
        drawPortal();
        drawEnemies();
        drawProjectiles();

        if (player && !player.dead) {
          drawPlayer(player);
        }

        drawParticles();
        ctx.restore();
      }

      function drawWorldScenery() {
        const palette = world.palette;

        ctx.save();
        ctx.globalAlpha = 0.22;

        if (currentLevelIndex === 0) {
          for (
            let x = 110;
            x < world.width;
            x += 310
          ) {
            const base =
              750 +
              Math.sin(x * 0.013) * 12;

            ctx.strokeStyle =
              palette.accent;

            ctx.lineWidth = 3;

            ctx.beginPath();
            ctx.moveTo(x, base);

            ctx.quadraticCurveTo(
              x - 18,
              base - 38,
              x + 4,
              base - 74
            );

            ctx.stroke();

            ctx.fillStyle =
              palette.accent2;

            ctx.beginPath();

            ctx.ellipse(
              x + 8,
              base - 76,
              10,
              18,
              0.55,
              0,
              TAU
            );

            ctx.fill();
          }
        } else if (currentLevelIndex === 1) {
          for (
            let x = 170;
            x < world.width;
            x += 420
          ) {
            ctx.strokeStyle =
              palette.accent2;

            ctx.lineWidth = 5;

            ctx.beginPath();
            ctx.moveTo(x, world.height);
            ctx.lineTo(
              x + 35,
              world.height - 240
            );
            ctx.lineTo(
              x + 80,
              world.height
            );
            ctx.stroke();
          }
        } else {
          for (
            let x = 200;
            x < world.width;
            x += 360
          ) {
            const y =
              1160 - x * 0.12;

            ctx.fillStyle =
              x % 720
                ? palette.accent
                : palette.accent2;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + 22, y - 90);
            ctx.lineTo(x + 44, y);
            ctx.closePath();
            ctx.fill();
          }
        }

        ctx.restore();
      }

      function drawPlatform(platform, moving) {
        const palette = world.palette;

        ctx.save();

        if (moving) {
          ctx.shadowBlur = 22;
          ctx.shadowColor =
            palette.accent;
        }

        if (currentLevelIndex === 0) {
          const gradient =
            ctx.createLinearGradient(
              platform.x,
              platform.y,
              platform.x,
              platform.y + platform.h
            );

          gradient.addColorStop(
            0,
            palette.platform
          );

          gradient.addColorStop(
            1,
            palette.platformDark
          );

          ctx.fillStyle = gradient;

          roundRectPath(
            ctx,
            platform.x,
            platform.y,
            platform.w,
            platform.h,
            Math.min(
              14,
              platform.h / 2
            )
          );

          ctx.fill();

          ctx.fillStyle = moving
            ? palette.accent2
            : palette.accent;

          ctx.globalAlpha =
            moving ? 0.9 : 0.7;

          roundRectPath(
            ctx,
            platform.x + 3,
            platform.y,
            platform.w - 6,
            Math.min(8, platform.h),
            5
          );

          ctx.fill();

          ctx.globalAlpha = 0.24;
          ctx.fillStyle =
            palette.accent;

          for (
            let x = platform.x + 14;
            x < platform.x + platform.w - 8;
            x += 26
          ) {
            ctx.beginPath();

            ctx.moveTo(
              x,
              platform.y + 2
            );

            ctx.quadraticCurveTo(
              x + 5,
              platform.y -
                9 -
                Math.sin(x) * 3,
              x + 10,
              platform.y + 2
            );

            ctx.fill();
          }
        } else if (currentLevelIndex === 1) {
          ctx.fillStyle =
            palette.platformDark;

          roundRectPath(
            ctx,
            platform.x,
            platform.y,
            platform.w,
            platform.h,
            Math.min(
              9,
              platform.h / 2
            )
          );

          ctx.fill();

          const metal =
            ctx.createLinearGradient(
              platform.x,
              platform.y,
              platform.x,
              platform.y +
                Math.min(
                  platform.h,
                  48
                )
            );

          metal.addColorStop(
            0,
            moving
              ? palette.accent
              : "#734d4b"
          );

          metal.addColorStop(
            1,
            palette.platform
          );

          ctx.fillStyle = metal;

          roundRectPath(
            ctx,
            platform.x + 2,
            platform.y + 2,
            platform.w - 4,
            Math.min(
              platform.h - 4,
              34
            ),
            7
          );

          ctx.fill();

          ctx.strokeStyle = moving
            ? hexToRgba(
                palette.accent,
                0.9
              )
            : hexToRgba(
                palette.accent2,
                0.42
              );

          ctx.lineWidth = 2;

          ctx.beginPath();
          ctx.moveTo(
            platform.x + 8,
            platform.y + 10
          );

          ctx.lineTo(
            platform.x +
              platform.w -
              8,
            platform.y + 10
          );

          ctx.stroke();

          ctx.fillStyle =
            "rgba(255,225,172,0.48)";

          for (
            let x = platform.x + 14;
            x < platform.x + platform.w - 8;
            x += 42
          ) {
            ctx.beginPath();
            ctx.arc(
              x,
              platform.y + 18,
              2.3,
              0,
              TAU
            );
            ctx.fill();
          }
        } else {
          const glass =
            ctx.createLinearGradient(
              platform.x,
              platform.y,
              platform.x + platform.w,
              platform.y + platform.h
            );

          glass.addColorStop(
            0,
            moving
              ? hexToRgba(
                  palette.accent,
                  0.75
                )
              : "#294c73"
          );

          glass.addColorStop(
            0.4,
            palette.platform
          );

          glass.addColorStop(
            1,
            palette.platformDark
          );

          ctx.fillStyle = glass;

          roundRectPath(
            ctx,
            platform.x,
            platform.y,
            platform.w,
            platform.h,
            Math.min(
              8,
              platform.h / 2
            )
          );

          ctx.fill();

          ctx.strokeStyle = moving
            ? palette.warm
