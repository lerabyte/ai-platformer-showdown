            : hexToRgba(
                palette.accent,
                0.55
              );

          ctx.lineWidth = 2;

          roundRectPath(
            ctx,
            platform.x + 1,
            platform.y + 1,
            platform.w - 2,
            Math.min(
              platform.h - 2,
              28
            ),
            7
          );

          ctx.stroke();

          ctx.globalAlpha = 0.22;
          ctx.fillStyle =
            palette.accent2;

          for (
            let x = platform.x + 18;
            x < platform.x + platform.w;
            x += 48
          ) {
            ctx.beginPath();
            ctx.moveTo(
              x,
              platform.y + 3
            );
            ctx.lineTo(
              x + 18,
              platform.y +
                Math.min(
                  24,
                  platform.h
                )
            );
            ctx.lineTo(
              x + 32,
              platform.y + 3
            );
            ctx.closePath();
            ctx.fill();
          }
        }

        if (moving) {
          ctx.globalAlpha = 0.85;
          ctx.fillStyle =
            palette.warm;

          const centerY =
            platform.y +
            Math.min(
              platform.h,
              22
            ) /
              2;

          const centerX =
            platform.x +
            platform.w / 2;

          if (platform.axis === "x") {
            ctx.beginPath();
            ctx.moveTo(
              centerX - 12,
              centerY
            );
            ctx.lineTo(
              centerX - 4,
              centerY - 5
            );
            ctx.lineTo(
              centerX - 4,
              centerY + 5
            );
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(
              centerX + 12,
              centerY
            );
            ctx.lineTo(
              centerX + 4,
              centerY - 5
            );
            ctx.lineTo(
              centerX + 4,
              centerY + 5
            );
            ctx.closePath();
            ctx.fill();
          } else {
            ctx.beginPath();
            ctx.moveTo(
              centerX,
              centerY - 8
            );
            ctx.lineTo(
              centerX - 5,
              centerY - 1
            );
            ctx.lineTo(
              centerX + 5,
              centerY - 1
            );
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(
              centerX,
              centerY + 8
            );
            ctx.lineTo(
              centerX - 5,
              centerY + 1
            );
            ctx.lineTo(
              centerX + 5,
              centerY + 1
            );
            ctx.closePath();
            ctx.fill();
          }
        }

        ctx.restore();
      }

      function drawPools() {
        const palette = world.palette;

        for (const pool of world.pools) {
          const gradient =
            ctx.createLinearGradient(
              pool.x,
              pool.y,
              pool.x,
              pool.y + pool.h
            );

          gradient.addColorStop(
            0,
            hexToRgba(
              palette.hazard,
              0.72
            )
          );

          gradient.addColorStop(
            0.2,
            hexToRgba(
              palette.accent2,
              0.38
            )
          );

          gradient.addColorStop(
            1,
            "rgba(5,3,16,0.96)"
          );

          ctx.fillStyle = gradient;

          ctx.fillRect(
            pool.x,
            pool.y,
            pool.w,
            pool.h
          );

          ctx.strokeStyle = hexToRgba(
            palette.hazard,
            0.9
          );

          ctx.lineWidth = 3;
          ctx.beginPath();

          for (
            let x = pool.x;
            x <= pool.x + pool.w;
            x += 16
          ) {
            const y =
              pool.y +
              Math.sin(
                globalTime * 3.4 +
                  x * 0.05
              ) *
                4;

            if (x === pool.x) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }

          ctx.stroke();

          ctx.globalAlpha = 0.2;
          ctx.fillStyle =
            palette.hazard;

          for (
            let x = pool.x + 14;
            x < pool.x + pool.w;
            x += 42
          ) {
            const bubbleY =
              pool.y +
              18 +
              ((globalTime * 28 +
                x * 0.7) %
                Math.max(
                  30,
                  pool.h - 18
                ));

            ctx.beginPath();
            ctx.arc(
              x,
              bubbleY,
              2 + (x % 5),
              0,
              TAU
            );
            ctx.fill();
          }

          ctx.globalAlpha = 1;
        }
      }

      function drawSpikes() {
        const palette = world.palette;

        ctx.save();
        ctx.shadowBlur = 12;
        ctx.shadowColor =
          palette.hazard;

        for (const spike of world.spikes) {
          const count = Math.max(
            2,
            Math.floor(spike.w / 18)
          );

          const step =
            spike.w / count;

          const gradient =
            ctx.createLinearGradient(
              spike.x,
              spike.y,
              spike.x,
              spike.y + spike.h
            );

          gradient.addColorStop(
            0,
            "#fff2fa"
          );

          gradient.addColorStop(
            0.25,
            palette.hazard
          );

          gradient.addColorStop(
            1,
            "#691334"
          );

          ctx.fillStyle = gradient;

          for (
            let index = 0;
            index < count;
            index++
          ) {
            ctx.beginPath();

            ctx.moveTo(
              spike.x + index * step,
              spike.y + spike.h
            );

            ctx.lineTo(
              spike.x +
                (index + 0.5) * step,
              spike.y +
                Math.sin(
                  globalTime * 4 +
                    index
                ) *
                  1.5
            );

            ctx.lineTo(
              spike.x +
                (index + 1) * step,
              spike.y + spike.h
            );

            ctx.closePath();
            ctx.fill();
          }
        }

        ctx.restore();
      }

      function drawLasers() {
        const palette = world.palette;

        for (const laser of world.lasers) {
          const active =
            laserIsActive(laser);

          const vertical =
            laser.h > laser.w;

          ctx.save();

          const emitterSize = 18;

          ctx.fillStyle = "#111b2d";

          ctx.strokeStyle = active
            ? palette.hazard
            : hexToRgba(
                palette.accent,
                0.5
              );

          ctx.lineWidth = 3;

          if (vertical) {
            ctx.beginPath();
            ctx.arc(
              laser.x + laser.w / 2,
              laser.y,
              emitterSize,
              0,
              TAU
            );
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(
              laser.x + laser.w / 2,
              laser.y + laser.h,
              emitterSize,
              0,
              TAU
            );
            ctx.fill();
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.arc(
              laser.x,
              laser.y + laser.h / 2,
              emitterSize,
              0,
              TAU
            );
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(
              laser.x + laser.w,
              laser.y + laser.h / 2,
              emitterSize,
              0,
              TAU
            );
            ctx.fill();
            ctx.stroke();
          }

          if (active) {
            const pulse =
              0.82 +
              Math.sin(
                globalTime * 18
              ) *
                0.16;

            ctx.shadowBlur = 24;
            ctx.shadowColor =
              palette.hazard;

            ctx.fillStyle = hexToRgba(
              palette.hazard,
              0.35
            );

            if (vertical) {
              ctx.fillRect(
                laser.x - 6,
                laser.y,
                laser.w + 12,
                laser.h
              );
            } else {
              ctx.fillRect(
                laser.x,
                laser.y - 6,
                laser.w,
                laser.h + 12
              );
            }

            ctx.fillStyle =
              `rgba(255,245,250,${pulse})`;

            if (vertical) {
              ctx.fillRect(
                laser.x +
                  laser.w / 2 -
                  2,
                laser.y,
                4,
                laser.h
              );
            } else {
              ctx.fillRect(
                laser.x,
                laser.y +
                  laser.h / 2 -
                  2,
                laser.w,
                4
              );
            }
          } else {
            ctx.setLineDash([8, 9]);

            ctx.strokeStyle = hexToRgba(
              palette.accent,
              0.24 +
                Math.sin(
                  globalTime * 5
                ) *
                  0.08
            );

            ctx.lineWidth = 2;
            ctx.beginPath();

            if (vertical) {
              ctx.moveTo(
                laser.x + laser.w / 2,
                laser.y
              );

              ctx.lineTo(
                laser.x + laser.w / 2,
                laser.y + laser.h
              );
            } else {
              ctx.moveTo(
                laser.x,
                laser.y + laser.h / 2
              );

              ctx.lineTo(
                laser.x + laser.w,
                laser.y + laser.h / 2
              );
            }

            ctx.stroke();
          }

          ctx.restore();
        }
      }

      function drawSprings() {
        const palette = world.palette;

        for (const spring of world.springs) {
          const compression =
            spring.pulse * 5;

          ctx.save();

          ctx.shadowBlur = 18;
          ctx.shadowColor =
            palette.warm;

          ctx.fillStyle = "#20243e";

          roundRectPath(
            ctx,
            spring.x,
            spring.y + compression,
            spring.w,
            spring.h - compression,
            6
          );

          ctx.fill();

          ctx.fillStyle =
            palette.warm;

          ctx.fillRect(
            spring.x + 5,
            spring.y + compression,
            spring.w - 10,
            4
          );

          ctx.strokeStyle =
            palette.accent2;

          ctx.lineWidth = 2;
          ctx.beginPath();

          ctx.moveTo(
            spring.x + 10,
            spring.y + spring.h
          );

          ctx.lineTo(
            spring.x + 18,
            spring.y + 5 + compression
          );

          ctx.lineTo(
            spring.x + 27,
            spring.y + spring.h
          );

          ctx.lineTo(
            spring.x + 36,
            spring.y + 5 + compression
          );

          ctx.lineTo(
            spring.x + spring.w - 9,
            spring.y + spring.h
          );

          ctx.stroke();
          ctx.restore();
        }
      }

      function drawCheckpoints() {
        const palette = world.palette;

        for (const checkpoint of world.checkpoints) {
          const centerX =
            checkpoint.x +
            checkpoint.w / 2;

          const glow =
            checkpoint.current
              ? 1
              : checkpoint.activated
                ? 0.55
                : 0.22;

          ctx.save();

          ctx.strokeStyle =
            checkpoint.current
              ? palette.accent
              : hexToRgba(
                  palette.accent,
                  0.45
                );

          ctx.lineWidth = 4;
          ctx.beginPath();

          ctx.moveTo(
            centerX,
            checkpoint.y +
              checkpoint.h
          );

          ctx.lineTo(
            centerX,
            checkpoint.y + 22
          );

          ctx.stroke();

          ctx.fillStyle = "#11182e";

          ctx.beginPath();

          ctx.moveTo(
            centerX - 15,
            checkpoint.y +
              checkpoint.h
          );

          ctx.lineTo(
            centerX + 15,
            checkpoint.y +
              checkpoint.h
          );

          ctx.lineTo(
            centerX + 10,
            checkpoint.y +
              checkpoint.h -
              10
          );

          ctx.lineTo(
            centerX - 10,
            checkpoint.y +
              checkpoint.h -
              10
          );

          ctx.closePath();
          ctx.fill();

          ctx.shadowBlur = 30 * glow;
          ctx.shadowColor =
            palette.accent;

          ctx.fillStyle =
            checkpoint.activated
              ? palette.accent
              : "#416272";

          ctx.beginPath();

          ctx.arc(
            centerX,
            checkpoint.y + 18,
            13 +
              Math.sin(
                globalTime * 3 +
                  checkpoint.x
              ) *
                1.5,
            0,
            TAU
          );

          ctx.fill();

          ctx.fillStyle =
            "rgba(255,255,255,0.8)";

          ctx.beginPath();

          ctx.arc(
            centerX - 3,
            checkpoint.y + 14,
            3.5,
            0,
            TAU
          );

          ctx.fill();

          if (checkpoint.current) {
            const beam =
              ctx.createLinearGradient(
                centerX,
                checkpoint.y - 130,
                centerX,
                checkpoint.y + 20
              );

            beam.addColorStop(
              0,
              "rgba(140,255,244,0)"
            );

            beam.addColorStop(
              1,
              hexToRgba(
                palette.accent,
                0.23
              )
            );

            ctx.fillStyle = beam;
            ctx.beginPath();

            ctx.moveTo(
              centerX - 18,
              checkpoint.y + 20
            );

            ctx.lineTo(
              centerX - 5,
              checkpoint.y - 130
            );

            ctx.lineTo(
              centerX + 5,
              checkpoint.y - 130
            );

            ctx.lineTo(
              centerX + 18,
              checkpoint.y + 20
            );

            ctx.closePath();
            ctx.fill();
          }

          ctx.restore();
        }
      }

      function drawCollectibles() {
        const palette = world.palette;

        for (const crystal of world.crystals) {
          if (!crystal.active) continue;

          const bob =
            Math.sin(
              globalTime * 3 +
                crystal.phase
            ) * 6;

          ctx.save();

          ctx.translate(
            crystal.x,
            crystal.y + bob
          );

          ctx.rotate(
            globalTime * 1.8 +
              crystal.phase
          );

          ctx.shadowBlur = 22;
          ctx.shadowColor =
            palette.accent;

          const gradient =
            ctx.createLinearGradient(
              -12,
              -16,
              12,
              16
            );

          gradient.addColorStop(
            0,
            "#ffffff"
          );

          gradient.addColorStop(
            0.34,
            palette.accent
          );

          gradient.addColorStop(
            1,
            palette.accent2
          );

          ctx.fillStyle = gradient;

          ctx.beginPath();
          ctx.moveTo(0, -17);
          ctx.lineTo(11, 0);
          ctx.lineTo(0, 17);
          ctx.lineTo(-11, 0);
          ctx.closePath();
          ctx.fill();

          ctx.globalAlpha = 0.65;
          ctx.fillStyle = "#ffffff";

          ctx.beginPath();
          ctx.moveTo(-2, -12);
          ctx.lineTo(3, -2);
          ctx.lineTo(-1, 7);
          ctx.lineTo(-6, 0);
          ctx.closePath();
          ctx.fill();

          ctx.restore();
        }

        for (const heart of world.hearts) {
          if (!heart.active) continue;

          const bob =
            Math.sin(
              globalTime * 2.6 +
                heart.phase
            ) * 7;

          ctx.save();

          ctx.translate(
            heart.x,
            heart.y + bob
          );

          ctx.rotate(
            Math.sin(
              globalTime * 1.5 +
                heart.phase
            ) * 0.15
          );

          ctx.shadowBlur = 24;
          ctx.shadowColor =
            palette.warm;

          ctx.fillStyle =
            palette.warm;

          for (
            let index = 0;
            index < 5;
            index++
          ) {
            ctx.save();

            ctx.rotate(
              (index / 5) * TAU +
                globalTime * 0.12
            );

            ctx.beginPath();

            ctx.ellipse(
              0,
              -11,
              6,
              12,
              0,
              0,
              TAU
            );

            ctx.fill();
            ctx.restore();
          }

          ctx.fillStyle = "#fffdf0";

          ctx.beginPath();
          ctx.arc(0, 0, 5, 0, TAU);
          ctx.fill();

          ctx.restore();
        }
      }

      function drawPortal() {
        const portal = world.portal;
        const palette = world.palette;

        const centerX =
          portal.x + portal.w / 2;

        const centerY =
          portal.y + portal.h / 2;

        ctx.save();
        ctx.translate(centerX, centerY);

        const pulse =
          1 +
          Math.sin(globalTime * 2.7) *
            0.05;

        ctx.scale(pulse, pulse);

        ctx.shadowBlur = 35;
        ctx.shadowColor =
          palette.accent;

        const inner =
          ctx.createRadialGradient(
            0,
            0,
            2,
            0,
            0,
            portal.w * 0.48
          );

        inner.addColorStop(
          0,
          "rgba(255,255,255,0.92)"
        );

        inner.addColorStop(
          0.22,
          hexToRgba(
            palette.accent,
            0.78
          )
        );

        inner.addColorStop(
          0.62,
          hexToRgba(
            palette.accent2,
            0.4
          )
        );

        inner.addColorStop(
          1,
          "rgba(10,8,35,0)"
        );

        ctx.fillStyle = inner;

        ctx.beginPath();

        ctx.ellipse(
          0,
          0,
          portal.w * 0.38,
          portal.h * 0.47,
          0,
          0,
          TAU
        );

        ctx.fill();

        ctx.lineWidth = 5;

        for (let index = 0; index < 3; index++) {
          ctx.strokeStyle =
            index === 1
              ? palette.accent2
              : palette.accent;

          ctx.globalAlpha =
            0.6 - index * 0.12;

          ctx.beginPath();

          ctx.ellipse(
            0,
            0,
            portal.w *
              (0.38 + index * 0.08),
            portal.h *
              (0.45 + index * 0.05),
            globalTime *
              (index % 2
                ? -0.42
                : 0.36) +
              index,
            0.25,
            TAU - 0.6
          );

          ctx.stroke();
        }

        ctx.globalAlpha = 1;

        for (let index = 0; index < 6; index++) {
          const angle =
            globalTime *
              (0.7 + index * 0.04) +
            (index / 6) * TAU;

          const radiusX =
            portal.w * 0.52;

          const radiusY =
            portal.h * 0.48;

          ctx.fillStyle =
            index % 2
              ? palette.warm
              : palette.accent;

          ctx.beginPath();

          ctx.arc(
            Math.cos(angle) * radiusX,
            Math.sin(angle) * radiusY,
            2.5 + (index % 3),
            0,
            TAU
          );

          ctx.fill();
        }

        ctx.restore();
      }

      function drawEnemies() {
        for (const enemy of world.enemies) {
          if (!enemy.alive) continue;

          if (enemy.type === "walker") {
            drawWalker(enemy);
          } else if (enemy.type === "flyer") {
            drawFlyer(enemy);
          } else {
            drawTurret(enemy);
          }
        }
      }

      function drawWalker(enemy) {
        const palette = world.palette;

        const bounce =
          Math.sin(
            globalTime * 7 +
              enemy.phase
          ) * 2;

        ctx.save();

        ctx.translate(
          enemy.x + enemy.w / 2,
          enemy.y +
            enemy.h / 2 +
            bounce
        );

        ctx.scale(enemy.dir, 1);

        ctx.shadowBlur = 16;
        ctx.shadowColor =
          palette.accent2;

        ctx.fillStyle =
          enemy.hitFlash > 0
            ? "#ffffff"
            : palette.accent2;

        ctx.beginPath();

        ctx.moveTo(
          -enemy.w * 0.42,
          enemy.h * 0.28
        );

        ctx.quadraticCurveTo(
          -enemy.w * 0.5,
          -enemy.h * 0.42,
          -8,
          -enemy.h * 0.45
        );

        ctx.quadraticCurveTo(
          7,
          -enemy.h * 0.66,
          enemy.w * 0.42,
          -enemy.h * 0.1
        );

        ctx.quadraticCurveTo(
          enemy.w * 0.5,
          enemy.h * 0.35,
          0,
          enemy.h * 0.38
        );

        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#141129";

        ctx.beginPath();
        ctx.arc(6, -4, 4.3, 0, TAU);
        ctx.arc(16, -2, 3.2, 0, TAU);
        ctx.fill();

        ctx.fillStyle = "#f6ffff";

        ctx.beginPath();
        ctx.arc(7, -5, 1.5, 0, TAU);
        ctx.arc(17, -3, 1.2, 0, TAU);
        ctx.fill();

        ctx.strokeStyle = hexToRgba(
          palette.accent2,
          0.7
        );

        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.beginPath();

        ctx.moveTo(
          -12,
          enemy.h * 0.25
        );

        ctx.lineTo(
          -15,
          enemy.h * 0.48
        );

        ctx.moveTo(
          12,
          enemy.h * 0.24
        );

        ctx.lineTo(
          17,
          enemy.h * 0.48
        );

        ctx.stroke();
        ctx.restore();
      }

      function drawFlyer(enemy) {
        const palette = world.palette;

        const flap =
          Math.sin(
            globalTime * 12 +
              enemy.phase
          ) * 0.55;

        ctx.save();

        ctx.translate(
          enemy.x + enemy.w / 2,
          enemy.y + enemy.h / 2
        );

        ctx.shadowBlur = 18;
        ctx.shadowColor =
          palette.accent2;

        ctx.fillStyle = hexToRgba(
          palette.accent,
          0.6
        );

        ctx.save();
        ctx.rotate(
          -0.35 + flap * 0.28
        );

        ctx.beginPath();

        ctx.ellipse(
          -17,
          0,
          18,
          7,
          0,
          0,
          TAU
        );

        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.rotate(
          0.35 - flap * 0.28
        );

        ctx.beginPath();

        ctx.ellipse(
          17,
          0,
          18,
          7,
          0,
          0,
          TAU
        );

        ctx.fill();
        ctx.restore();

        const body =
          ctx.createLinearGradient(
            0,
            -14,
            0,
            14
          );

        body.addColorStop(
          0,
          "#ffffff"
        );

        body.addColorStop(
          0.35,
          palette.accent2
        );

        body.addColorStop(
          1,
          "#4c205b"
        );

        ctx.fillStyle = body;

        ctx.beginPath();
        ctx.moveTo(0, -16);
        ctx.lineTo(12, 0);
        ctx.lineTo(0, 16);
        ctx.lineTo(-12, 0);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#10152d";

        ctx.beginPath();
        ctx.arc(-4, -2, 2.2, 0, TAU);
        ctx.arc(4, -2, 2.2, 0, TAU);
        ctx.fill();

        ctx.restore();
      }

      function drawTurret(enemy) {
        const palette = world.palette;

        const charge = clamp(
          1 -
            enemy.shootTimer /
              enemy.cooldown,
          0,
          1
        );

        ctx.save();

        ctx.translate(
          enemy.x + enemy.w / 2,
          enemy.y + enemy.h / 2
        );

        ctx.shadowBlur =
          12 + charge * 20;

        ctx.shadowColor =
          palette.hazard;

        ctx.fillStyle = "#131b37";

        ctx.beginPath();

        for (let index = 0; index < 8; index++) {
          const angle =
            (index / 8) * TAU +
            globalTime * 0.35;

          const radius =
            index % 2 ? 19 : 25;

          const x =
            Math.cos(angle) * radius;

          const y =
            Math.sin(angle) * radius;

          if (index === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }

        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle =
          palette.accent2;

        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle =
          charge > 0.72
            ? "#fff6fb"
            : palette.hazard;

        ctx.beginPath();
        ctx.arc(
          0,
          0,
          7 + charge * 3,
          0,
          TAU
        );
        ctx.fill();

        ctx.fillStyle = "#080c1b";

        ctx.beginPath();
        ctx.arc(0, 0, 3, 0, TAU);
        ctx.fill();

        ctx.restore();
      }

      function drawProjectiles() {
        const palette = world.palette;

        for (const projectile of projectiles) {
          ctx.save();

          ctx.translate(
            projectile.x +
              projectile.w / 2,
            projectile.y +
              projectile.h / 2
          );

          ctx.rotate(projectile.phase);

          ctx.shadowBlur = 20;
          ctx.shadowColor =
            palette.hazard;

          ctx.fillStyle =
            palette.hazard;

          ctx.beginPath();
          ctx.moveTo(0, -8);
          ctx.lineTo(7, 0);
          ctx.lineTo(0, 8);
          ctx.lineTo(-7, 0);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#ffffff";

          ctx.beginPath();
          ctx.arc(0, 0, 2.5, 0, TAU);
          ctx.fill();

          ctx.restore();
        }
      }

      function drawPlayer(entity) {
        if (
          entity.invulnerable > 0 &&
          Math.floor(
            entity.invulnerable * 16
          ) %
            2 ===
            0
        ) {
          return;
        }

        const palette = world.palette;

        const speedRatio = clamp(
          Math.abs(entity.vx) / 335,
          0,
          1
        );

        const run =
          Math.sin(entity.animTime * 2.2);

        const airborneTilt =
          entity.grounded
            ? 0
            : clamp(
                entity.vx / 1000,
                -0.22,
                0.22
              ) +
              clamp(
                entity.vy / 3000,
                -0.12,
                0.18
              );

        const squashX =
          1 + entity.squash;

        const squashY =
          1 - entity.squash * 0.75;

        const fade =
          mode === "finishing"
            ? 1 -
              entity.portalPull * 0.75
            : 1;

        ctx.save();
        ctx.globalAlpha = fade;

        ctx.translate(
          entity.x + entity.w / 2,
          entity.y +
            entity.h / 2 +
            (entity.grounded
              ? Math.abs(run) *
                speedRatio *
                1.4
              : 0)
        );

        ctx.rotate(airborneTilt);

        ctx.scale(
          entity.facing * squashX,
          squashY
        );

        ctx.globalAlpha =
          0.22 * fade;

        ctx.fillStyle = "#000000";

        ctx.beginPath();

        ctx.ellipse(
          0,
          entity.h / 2 + 6,
          18 - speedRatio * 3,
          6,
          0,
          0,
          TAU
        );

        ctx.fill();

        ctx.globalAlpha = fade;

        const scarfWave =
          Math.sin(
            globalTime * 8 +
              entity.x * 0.04
          ) * 4;

        ctx.strokeStyle =
          palette.accent2;

        ctx.lineWidth = 6;
        ctx.lineCap = "round";

        ctx.beginPath();
        ctx.moveTo(-7, -4);

        ctx.quadraticCurveTo(
          -22 - speedRatio * 8,
          1 + scarfWave,
          -34 - speedRatio * 13,
          -5 - scarfWave * 0.4
        );

        ctx.stroke();

        ctx.fillStyle =
          palette.warm;

        ctx.beginPath();

        ctx.arc(
          -34 - speedRatio * 13,
          -5 - scarfWave * 0.4,
          3.2,
          0,
          TAU
        );

        ctx.fill();

        ctx.strokeStyle = hexToRgba(
          palette.accent,
          0.9
        );

        ctx.lineWidth = 5;
        ctx.lineCap = "round";

        const legSwing =
          entity.grounded
            ? run * 5 * speedRatio
            : 0;

        ctx.beginPath();

        ctx.moveTo(-7, 14);
        ctx.lineTo(
          -8 + legSwing,
          24
        );

        ctx.moveTo(7, 14);
        ctx.lineTo(
          8 - legSwing,
          24
        );

        ctx.stroke();

        ctx.shadowBlur = 20;
        ctx.shadowColor =
          palette.accent;

        const bodyGradient =
          ctx.createLinearGradient(
            0,
            -12,
            0,
            20
          );

        bodyGradient.addColorStop(
          0,
          "#f7ffff"
        );

        bodyGradient.addColorStop(
          0.32,
          palette.accent
        );

        bodyGradient.addColorStop(
          1,
          "#3cb4a9"
        );

        ctx.fillStyle =
          bodyGradient;

        ctx.beginPath();

        ctx.ellipse(
          0,
          6,
          14,
          18,
          0,
          0,
          TAU
        );

        ctx.fill();

        ctx.shadowBlur = 0;

        const headGradient =
          ctx.createRadialGradient(
            -5,
            -18,
            2,
            0,
            -14,
            18
          );

        headGradient.addColorStop(
          0,
          "#ffffff"
        );

        headGradient.addColorStop(
          0.55,
          "#eaffff"
        );

        headGradient.addColorStop(
          1,
          "#a9f5ed"
        );

        ctx.fillStyle =
          headGradient;

        ctx.beginPath();

        ctx.arc(
          0,
          -15,
          16,
          0,
          TAU
        );

        ctx.fill();

        ctx.fillStyle = "#102139";

        ctx.beginPath();

        ctx.ellipse(
          -5.5,
          -16,
          2.2,
          3.2,
          0,
          0,
          TAU
        );

        ctx.ellipse(
          5.5,
          -16,
          2.2,
          3.2,
          0,
          0,
          TAU
        );

        ctx.fill();

        ctx.strokeStyle =
          "rgba(16,33,57,0.7)";

        ctx.lineWidth = 1.5;
        ctx.beginPath();

        ctx.arc(
          0,
          -10,
          4,
          0.25,
          Math.PI - 0.25
        );

        ctx.stroke();

        ctx.strokeStyle =
          palette.accent;

        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.moveTo(1, -30);

        ctx.quadraticCurveTo(
          0,
          -39,
          6,
          -44
        );

        ctx.stroke();

        ctx.shadowBlur = 12;
        ctx.shadowColor =
          palette.accent;

        ctx.fillStyle =
          palette.accent;

        ctx.beginPath();

        ctx.ellipse(
          8,
          -44,
          6,
          12,
          0.52 +
            Math.sin(globalTime * 3) *
              0.08,
          0,
          TAU
        );

        ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of particles) {
          const alpha = clamp(
            particle.life /
              particle.maxLife,
            0,
            1
          );

          ctx.save();
          ctx.globalAlpha = alpha;

          ctx.translate(
            particle.x,
            particle.y
          );

          ctx.fillStyle =
            particle.color;

          ctx.strokeStyle =
            particle.color;

          ctx.shadowBlur =
            particle.shape === "dot"
              ? 6
              : 12;

          ctx.shadowColor =
            particle.color;

          if (particle.shape === "diamond") {
            ctx.rotate(
              globalTime * 5 +
                particle.x * 0.01
            );

            ctx.beginPath();

            ctx.moveTo(
              0,
              -particle.size
            );

            ctx.lineTo(
              particle.size * 0.65,
              0
            );

            ctx.lineTo(
              0,
              particle.size
            );

            ctx.lineTo(
              -particle.size * 0.65,
              0
            );

            ctx.closePath();
            ctx.fill();
          } else if (
            particle.shape === "spark"
          ) {
            ctx.lineWidth = Math.max(
              1,
              particle.size * 0.35
            );

            ctx.beginPath();

            ctx.moveTo(
              -particle.vx * 0.018,
              -particle.vy * 0.018
            );

            ctx.lineTo(
              particle.vx * 0.008,
              particle.vy * 0.008
            );

            ctx.stroke();
          } else if (
            particle.shape === "petal"
          ) {
            ctx.rotate(
              globalTime * 3 +
                particle.x
            );

            ctx.beginPath();

            ctx.ellipse(
              0,
              0,
              particle.size * 0.55,
              particle.size,
              0.4,
              0,
              TAU
            );

            ctx.fill();
          } else {
            ctx.beginPath();

            ctx.arc(
              0,
              0,
              particle.size * alpha,
              0,
              TAU
            );

            ctx.fill();
          }

          ctx.restore();
        }
      }

      function drawHUD() {
        if (!world || !player) return;

        const palette = world.palette;

        ctx.save();
        ctx.textBaseline = "middle";

        ctx.fillStyle =
          "rgba(4,9,23,0.72)";

        roundRectPath(
          ctx,
          22,
          20,
          368,
          78,
          18
        );

        ctx.fill();

        ctx.strokeStyle = hexToRgba(
          palette.accent,
          0.24
        );

        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle =
          palette.accent;

        ctx.font =
          "800 13px ui-rounded, system-ui, sans-serif";

        ctx.fillText(
          `LEVEL ${currentLevelIndex + 1} · ${world.name.toUpperCase()}`,
          42,
          43
        );

        ctx.fillStyle = "#f4feff";

        ctx.font =
          "900 26px ui-monospace, SFMono-Regular, Menlo, monospace";

        ctx.fillText(
          score
            .toString()
            .padStart(6, "0"),
          42,
          72
        );

        ctx.fillStyle = "#8faeba";

        ctx.font =
          "700 11px ui-rounded, system-ui, sans-serif";

        ctx.fillText("SCORE", 218, 72);

        ctx.fillStyle =
          "rgba(4,9,23,0.72)";

        roundRectPath(
          ctx,
          W - 378,
          20,
          356,
          78,
          18
        );

        ctx.fill();

        ctx.strokeStyle = hexToRgba(
          palette.accent2,
          0.24
        );

        ctx.stroke();

        ctx.fillStyle = "#9bb9c4";

        ctx.font =
          "800 11px ui-rounded, system-ui, sans-serif";

        ctx.fillText(
          "SPARKS",
          W - 355,
          43
        );

        for (
          let index = 0;
          index < maxHealth;
          index++
        ) {
          drawHeartIcon(
            W - 300 + index * 30,
            43,
            index < health,
            palette
          );
        }

        drawShardIcon(
          W - 350,
          72,
          palette
        );

        ctx.fillStyle = "#f5ffff";

        ctx.font =
          "900 18px ui-monospace, SFMono-Regular, Menlo, monospace";

        ctx.fillText(
          `${levelShards}/${world.crystals.length}`,
          W - 323,
          72
        );

        ctx.fillStyle = "#8faeba";

        ctx.font =
          "700 11px ui-rounded, system-ui, sans-serif";

        ctx.fillText(
          `TIME ${formatTime(levelTime)}`,
          W - 185,
          72
        );

        if (notice.timer > 0) {
          const life =
            notice.timer /
            notice.duration;

          const alpha = clamp(
            Math.min(
              1,
              (1 - life) * 7,
              life * 3
            ),
            0,
            1
          );

          ctx.globalAlpha = alpha;

          ctx.font =
            "800 17px ui-rounded, system-ui, sans-serif";

          const width =
            ctx.measureText(
              notice.text
            ).width + 44;

          ctx.fillStyle =
            "rgba(3,8,21,0.78)";

          roundRectPath(
            ctx,
            W / 2 - width / 2,
            H - 72,
            width,
            42,
            14
          );

          ctx.fill();

          ctx.strokeStyle =
            hexToRgba(
              notice.color,
              0.45
            );

          ctx.stroke();

          ctx.fillStyle =
            notice.color;

          ctx.textAlign = "center";

          ctx.fillText(
            notice.text,
            W / 2,
            H - 51
          );

          ctx.textAlign = "left";
          ctx.globalAlpha = 1;
        }

        if (banner.timer > 0) {
          const elapsed =
            banner.duration -
            banner.timer;

          const inAlpha = clamp(
            elapsed * 2.6,
            0,
            1
          );

          const outAlpha = clamp(
            banner.timer * 1.7,
            0,
            1
          );

          const alpha = Math.min(
            inAlpha,
            outAlpha
          );

          const y =
            155 -
            easeOutCubic(
              clamp(
                elapsed / 0.7,
                0,
                1
              )
            ) *
              25;

          ctx.globalAlpha = alpha;
          ctx.textAlign = "center";

          ctx.fillStyle =
            palette.accent;

          ctx.font =
            "900 15px ui-rounded, system-ui, sans-serif";

          ctx.fillText(
            `LEVEL ${currentLevelIndex + 1}`,
            W / 2,
            y
          );

          ctx.fillStyle = "#f5ffff";

          ctx.font =
            "900 42px ui-rounded, system-ui, sans-serif";

          ctx.fillText(
            world.name,
            W / 2,
            y + 42
          );

          ctx.fillStyle = "#a9c6d1";

          ctx.font =
            "600 15px ui-rounded, system-ui, sans-serif";

          ctx.fillText(
            world.subtitle,
            W / 2,
            y + 74
          );

          ctx.textAlign = "left";
          ctx.globalAlpha = 1;
        }

        ctx.fillStyle =
          "rgba(255,255,255,0.42)";

        ctx.font =
          "700 11px ui-rounded, system-ui, sans-serif";

        ctx.textAlign = "right";

        ctx.fillText(
          `${AudioEngine.muted ? "MUTED" : "SOUND"} · M`,
          W - 26,
          H - 18
        );

        ctx.textAlign = "left";
        ctx.restore();
      }

      function drawHeartIcon(
        x,
        y,
        filled,
        palette
      ) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(0.65, 0.65);

        ctx.fillStyle = filled
          ? palette.hazard
          : "rgba(125,149,161,0.22)";

        if (filled) {
          ctx.shadowBlur = 12;
          ctx.shadowColor =
            palette.hazard;
        }

        ctx.beginPath();
        ctx.moveTo(0, 9);

        ctx.bezierCurveTo(
          -18,
          -2,
          -14,
          -17,
          -4,
          -16
        );

        ctx.bezierCurveTo(
          2,
          -16,
          5,
          -12,
          6,
          -8
        );

        ctx.bezierCurveTo(
          8,
          -13,
          12,
          -16,
          18,
          -15
        );

        ctx.bezierCurveTo(
          29,
          -12,
          29,
          3,
          14,
          15
        );

        ctx.lineTo(6, 21);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
      }

      function drawShardIcon(
        x,
        y,
        palette
      ) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(globalTime * 0.9);

        ctx.fillStyle =
          palette.accent;

        ctx.shadowBlur = 12;
        ctx.shadowColor =
          palette.accent;

        ctx.beginPath();
        ctx.moveTo(0, -9);
        ctx.lineTo(6, 0);
        ctx.lineTo(0, 9);
        ctx.lineTo(-6, 0);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
      }

      function render() {
        ctx.setTransform(
          1,
          0,
          0,
          1,
          0,
          0
        );

        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation =
          "source-over";

        ctx.clearRect(0, 0, W, H);

        if (!world || mode === "title") {
          drawTitleBackground();
        } else {
          drawBackground();
          drawWorld();
          drawHUD();
        }

        if (mode === "paused") {
          ctx.fillStyle =
            "rgba(1,4,12,0.28)";

          ctx.fillRect(0, 0, W, H);
        }

        if (flash > 0) {
          ctx.fillStyle =
            `rgba(255, ${flash > 0.45 ? 105 : 220}, ${flash > 0.45 ? 145 : 245}, ${flash * 0.38})`;

          ctx.fillRect(0, 0, W, H);
        }

        if (transition > 0) {
          ctx.fillStyle =
            `rgba(3,5,15,${transition})`;

          ctx.fillRect(0, 0, W, H);
        }
      }

      let lastTime = performance.now();

      function frame(now) {
        const deltaTime = Math.min(
          1 / 30,
          Math.max(
            0,
            (now - lastTime) / 1000
          )
        );

        lastTime = now;

        update(deltaTime);
        render();

        requestAnimationFrame(frame);
      }

      showTitleScreen();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
